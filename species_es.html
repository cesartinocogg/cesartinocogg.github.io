<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" type="image/x-icon" href="favicon.png">
<title>Explorador de Especies · César Tinoco · Universo Expandido</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
  :root {
    --ink:       #0d0d0f;
    --paper:     #f5f2ec;
    --muted:     #888070;
    --rule:      rgba(245, 242, 236, 0.2);
    --rudon:     #8b4a1c;
    --rudon-lt:  #f0d5b8;
    --azul:      #1a3a5c;
    --azul-lt:   #c0d8f0;
    --vonder:    #3a1020;
    --vonder-lt: #e8c0c8;
    --accent:    #c8a860;
    --bg-sec:    #161619;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Cormorant Garamond', Georgia, serif;
    background: var(--ink);
    color: var(--paper);
    font-size: 18px;
    line-height: 1.65;
  }

  #sx { padding: 4rem 5rem; max-width: 1400px; margin: 0 auto; }
  
  .sx-hdr {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
    padding-bottom: 1rem;
    border-bottom: 2px solid var(--accent);
    margin-bottom: 2.5rem;
  }
  .sx-hdr h2 { 
    font-size: clamp(2rem, 4vw, 3.2rem); 
    font-weight: 300; 
    line-height: 1.2; 
    letter-spacing: -.01em;
    margin: 0;
  }
  .sx-hdr span { 
    font-family: 'DM Mono', monospace; 
    font-size: .75rem; 
    letter-spacing: .18em; 
    text-transform: uppercase; 
    color: var(--accent);
    align-self: flex-end;
  }
  .portfolio-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--rule);
    padding: 0.5rem 1.2rem;
    border-radius: 0;
    color: var(--paper);
    text-decoration: none;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    display: inline-block;
    align-self: center;
  }
  .portfolio-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(200, 168, 96, 0.08);
  }

  .world-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-bottom: 2.5rem; }
  .wcard { 
    cursor: pointer; background: var(--bg-sec); border: 1px solid var(--rule); 
    overflow: hidden; transition: border-color .2s, transform .2s; position: relative; 
  }
  .wcard:hover { transform: translateY(-4px); border-color: var(--muted); }
  .wcard.active { border-width: 2px; }
  .wcard-img { width: 100%; aspect-ratio: 16/7; object-fit: cover; display: block; opacity: 0.8; transition: opacity .2s; }
  .wcard:hover .wcard-img { opacity: 1; }
  .wcard-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
  .wcard-info { padding: 1.2rem 1.5rem; }
  .wcard-genre { font-family: 'DM Mono', monospace; font-size: .65rem; letter-spacing: .18em; text-transform: uppercase; margin-bottom: .4rem; }
  .wcard-name { font-size: 1.4rem; font-weight: 300; line-height: 1.2; }
  .wcard-count { font-family: 'DM Mono', monospace; font-size: .65rem; margin-top: .5rem; color: rgba(245,242,236,.6); letter-spacing: .1em; text-transform: uppercase; }

  .sx-toolbar { 
    display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; 
    background: var(--bg-sec); padding: .8rem 1.2rem; border: 1px solid var(--rule); 
  }
  .sx-filter { 
    flex: 1; background: transparent; border: none; color: var(--paper); 
    font-family: 'DM Mono', monospace; font-size: .8rem; outline: none; letter-spacing: .05em; 
  }
  .sx-filter::placeholder { color: rgba(245,242,236,.3); }
  .sx-label { font-family: 'DM Mono', monospace; font-size: .7rem; letter-spacing: .12em; text-transform: uppercase; color: var(--accent); margin-left: auto; }

  .sp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1.5rem; }
  .spcard { 
    cursor: pointer; aspect-ratio: 2/3; position: relative; overflow: hidden; 
    border: 1px solid var(--rule); transition: transform .25s, border-color .2s; background: var(--bg-sec);
  }
  .spcard:hover { transform: translateY(-4px) scale(1.02); }
  .spcard-img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .3s; opacity: 0.85; }
  .spcard:hover .spcard-img { transform: scale(1.05); opacity: 1; }
  .spcard-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(13,13,15,.95) 0%, rgba(13,13,15,.6) 40%, transparent 70%); }
  .spcard-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 1rem; }
  .spcard-concept { font-family: 'DM Mono', monospace; font-size: .55rem; letter-spacing: .12em; text-transform: uppercase; margin-bottom: .3rem; opacity: .9; }
  .spcard-name { font-size: 1.1rem; font-weight: 400; line-height: 1.2; margin-bottom: .5rem; }
  .tags-mini { display: flex; gap: .3rem; flex-wrap: wrap; }
  .tag-mini { font-family: 'DM Mono', monospace; font-size: .5rem; letter-spacing: .08em; padding: .15rem .4rem; border: 1px solid; opacity: .8; text-transform: uppercase; }

  .modal-wrap { display: none; position: fixed; inset: 0; z-index: 1000; align-items: center; justify-content: center; padding: 2rem; }
  .modal-wrap.open { display: flex; animation: fadeIn .2s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal-bg { position: absolute; inset: 0; background: rgba(0,0,0,.9); cursor: zoom-out; }
  .modal-box { 
    position: relative; z-index: 1; display: flex; width: 100%; max-width: 900px; max-height: 85vh; 
    background: var(--ink); border: 1px solid var(--rule); overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
  }
  .modal-img-wrap { width: 35%; flex-shrink: 0; position: relative; background: var(--bg-sec); }
  .modal-img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0.9; filter: grayscale(15%); }
  .modal-body { flex: 1; overflow-y: auto; padding: 3rem 4rem; }
  .modal-project { font-family: 'DM Mono', monospace; font-size: .68rem; letter-spacing: .18em; text-transform: uppercase; margin-bottom: .8rem; }
  .modal-name { font-size: clamp(2rem, 3vw, 2.8rem); font-weight: 300; line-height: 1.1; margin-bottom: .8rem; letter-spacing: -.01em; }
  .modal-concept { font-size: 1.12rem; font-style: italic; color: rgba(245,242,236,.65); margin-bottom: 1.5rem; line-height: 1.6; }
  .modal-tags { display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: 2.5rem; }
  .modal-tag { font-family: 'DM Mono', monospace; font-size: .65rem; letter-spacing: .1em; text-transform: uppercase; padding: .3rem .8rem; border: 1px solid; }
  .modal-divider { border-top: 1px solid var(--rule); margin: 2rem 0; height: 0; }
  .modal-section { margin-bottom: 1.8rem; }
  .modal-sec-label { font-family: 'DM Mono', monospace; font-size: .7rem; letter-spacing: .14em; text-transform: uppercase; margin-bottom: .8rem; padding-bottom: .4rem; border-bottom: 1px solid var(--rule); color: var(--muted); }
  .modal-sec-body { font-size: 1rem; line-height: 1.65; color: rgba(245,242,236,.85); }
  .modal-close { position: absolute; top: 1.2rem; right: 1.5rem; background: none; border: none; font-size: 2.5rem; cursor: pointer; color: var(--paper); line-height: 1; z-index: 2; font-family: 'DM Mono', monospace; opacity: .6; transition: opacity .2s; }
  .modal-close:hover { opacity: 1; }
  .empty { padding: 4rem 2rem; text-align: center; font-family: 'DM Mono', monospace; font-size: .8rem; letter-spacing: .1em; color: var(--muted); text-transform: uppercase; }

  @media (max-width: 900px) {
    #sx { padding: 2rem 1.5rem; }
    .world-row { grid-template-columns: 1fr; }
    .modal-box { flex-direction: column; overflow-y: auto; }
    .modal-img-wrap { width: 100%; height: 200px; }
    .modal-body { padding: 2rem 1.5rem; overflow-y: visible; }
    .modal-close { top: .5rem; right: .8rem; }
    .sx-hdr {
      flex-direction: column;
      align-items: stretch;
    }
    .portfolio-btn {
      align-self: flex-start;
    }
  }
</style>
</head>

<script>
// ======================== UTILIDADES SVG ==========================
function mkSVG(bg,ac,lt,pat="hex"){
  const P={
    scales:`<path d="M55,55 Q105,30 155,55 Q205,30 255,55" fill="none" stroke="${ac}" stroke-width="1.5" opacity=".3"/><path d="M35,92 Q85,67 135,92 Q185,67 235,92 Q280,67 300,92" fill="none" stroke="${ac}" stroke-width="1.4" opacity=".2"/><path d="M55,128 Q105,103 155,128 Q205,103 255,128" fill="none" stroke="${ac}" stroke-width="1.2" opacity=".15"/>`,
    hex:`<polygon points="150,22 218,60 218,138 150,176 82,138 82,60" fill="none" stroke="${ac}" stroke-width="1.2" opacity=".3"/><polygon points="150,52 198,78 198,132 150,158 102,132 102,78" fill="none" stroke="${ac}" stroke-width=".8" opacity=".15"/>`,
    circle:`<circle cx="150" cy="105" r="72" fill="none" stroke="${ac}" stroke-width="1.2" opacity=".3"/><circle cx="150" cy="105" r="46" fill="none" stroke="${ac}" stroke-width=".8" opacity=".2"/><circle cx="150" cy="105" r="20" fill="${ac}" opacity=".15"/>`,
    crystal:`<polygon points="150,14 196,78 185,168 115,168 104,78" fill="none" stroke="${ac}" stroke-width="1.2" opacity=".3"/><line x1="127" y1="14" x2="150" y2="168" stroke="${ac}" stroke-width=".6" opacity=".15"/><line x1="173" y1="14" x2="150" y2="168" stroke="${ac}" stroke-width=".6" opacity=".15"/>`,
    wave:`<path d="M36,86 Q78,50 118,86 Q160,122 202,86 Q244,50 276,86" fill="none" stroke="${ac}" stroke-width="1.5" opacity=".3"/><path d="M36,118 Q78,82 118,118 Q160,154 202,118 Q244,82 276,118" fill="none" stroke="${ac}" stroke-width="1" opacity=".2"/>`,
    gothic:`<path d="M150,18 L170,58 L202,58 L178,80 L188,114 L150,93 L112,114 L122,80 L98,58 L130,58 Z" fill="none" stroke="${ac}" stroke-width="1.2" opacity=".3"/><rect x="134" y="58" width="32" height="52" fill="none" stroke="${ac}" stroke-width=".8" opacity=".15" rx="16"/>`
  };
  const s=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 380"><rect width="300" height="380" fill="${bg}"/><rect width="300" height="380" fill="${ac}" opacity=".08"/>${P[pat]||P.hex}<text x="150" y="245" font-family="Georgia,serif" font-size="70" font-weight="bold" text-anchor="middle" fill="${ac}" opacity=".2">${lt}</text><rect x="0" y="0" width="5" height="380" fill="${ac}" opacity=".85"/></svg>`;
  return "data:image/svg+xml,"+encodeURIComponent(s);
}
function mkProj(bg,ac,lbl){
  const s=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220"><rect width="600" height="220" fill="${bg}"/><text x="300" y="130" font-family="Georgia,serif" font-size="100" font-weight="bold" text-anchor="middle" fill="${ac}" opacity=".15">${lbl}</text><rect x="0" y="0" width="7" height="220" fill="${ac}" opacity=".9"/><text x="28" y="192" font-family="monospace" font-size="8" fill="${ac}" opacity=".4" letter-spacing="3">IMAGEN DEL PROYECTO</text></svg>`;
  return "data:image/svg+xml,"+encodeURIComponent(s);
}
const cRudon = "#8b4a1c", cRudonLt = "#f0d5b8";
const cAzul = "#1a3a5c", cAzulLt = "#c0d8f0";
const cVonder = "#3a1020", cVonderLt = "#e8c0c8";

// ========== DATOS COMPLETOS SEGÚN LOS TRES DOCUMENTOS ==========
// UNIVERSO RUDON (dragones, humanos, criaturas inteligentes)
const rudonSpecies = [
    // METÁLICOS
    {id:"r01",group:"Metálico",name:"Dragón Dorado",concept:"Liderazgo · Líder Natural",tags:["Metálico","Gobernante","Reyes"],
     morph:"Escamas de un dorado brillante y uniforme que intensifica su lustre con la edad. El adulto mide hasta 2,5 metros en postura bípeda. Seis extremidades. Las reinas de escama dorada alcanzan los diez metros y ya no pueden volar.",
     culture:"Líderes naturales y sabios. Son los dragones más codiciados como reyes de otros nidos: enviados como príncipes a nidos ajenos, su genética y su talento para el gobierno los convierte en los gestores más solicitados de toda Rudon.",
     narrative:"La facción con mayor influencia política en los asuntos de Rudon. El destino del mundo pasa por sus decisiones más de lo que muchos querrían admitir.",
     img:mkSVG("#1A1000","#D4AF37","D","scales")},
    {id:"r02",group:"Metálico",name:"Dragón Plateado",concept:"Habilidad Mágica · Historial",tags:["Metálico","Historiador","Mago"],
     morph:"Escamas de plata pulida con reflejos fríos. Comparte la constitución hexápoda estándar de los dragones metálicos. Voz clara y proyectada, decisiva para el Dragohismo en registros históricos y de archivo.",
     culture:"Hábiles en la magia y excelentes historiadores. Son los guardianes de la memoria colectiva dracónica. Sus archivos en Comestio son los más completos y los más protegidos del mundo.",
     narrative:"La historia que saben y la que deciden no registrar son igualmente poderosas. Los silencios plateados tienen tanto peso narrativo como sus crónicas.",
     img:mkSVG("#10101A","#C0C0C8","P","hex")},
    {id:"r03",group:"Metálico",name:"Dragón Broncíneo",concept:"Táctica · Experto en Batalla",tags:["Metálico","Guerrero","Estratega"],
     morph:"Escamas de bronce cálido con bordes ligeramente más oscuros. Constitución algo más robusta que el promedio metálico, con una musculatura alar desarrollada que favorece maniobras rápidas en combate aéreo.",
     culture:"Expertos en batallas y tácticas. Los nidos broncíneos mantienen academias militares propias y sus guardianes son los más solicitados en conflictos entre clanes. Rigen el combate aereo de Rudon.",
     narrative:"Son el componente más activo de cualquier coalición militar dracónica. Cuando los broncíneos se mueven, alguien ha decidido que la diplomacia ya falló.",
     img:mkSVG("#160C04","#CD7F32","B","scales")},
    {id:"r04",group:"Metálico",name:"Dragón Ocre",concept:"Construcción · Agricultura",tags:["Metálico","Constructor","Obrero"],
     morph:"Escamas de un terracota amarillo-marrón, terrosas y con una textura ligeramente rugosa. Extremidades inferiores más robustas que otros metálicos, adaptadas para trabajo en tierra firme y carga de materiales.",
     culture:"Buenos constructores y agricultores. Son los responsables de que los nidos metálicos tengan las infraestructuras más sólidas y los aprovisionamientos más estables. Su trabajo es invisible hasta que falta.",
     narrative:"La guerra no se gana solo en el aire. Los ocres son quienes hacen posible que todos los demás puedan pelear.",
     img:mkSVG("#160E06","#C19A6B","O","hex")},
    {id:"r05",group:"Metálico",name:"Dragón Cobrizo",concept:"Diplomacia · Comercio",tags:["Metálico","Diplomático","Comerciante"],
     morph:"Escamas de un cobre rojizo-anaranjado con destellos cálidos. Físicamente similares al promedio metálico, destacan por una agilidad vocal que favorece el Dragohismo persuasivo y los registros de acuerdo.",
     culture:"Muy diplomáticos y grandes comerciantes. Son los intermediarios naturales entre nidos, entre especies y entre facciones. Su neutralidad comercial es una herramienta tanto como una filosofía.",
     narrative:"Sin los cobrizos, la mitad de los pactos entre dragones y humanos nunca habría existido. Y sin ellos, nadie lo sabría.",
     img:mkSVG("#140A04","#B87333","C","circle")},
    // MATES
    {id:"r06",group:"Mate",name:"Dragón Rojo",concept:"Fuerza Bruta · Guerrero Feroz",tags:["Mate","Guerrero","Más Fuerte"],
     morph:"Escamas rojas de acabado mate, más gruesas que las de cualquier otro dragón. Constitución la más masiva entre los mates. La ventaja física de un rojo adulto sobre cualquier humano es absoluta.",
     culture:"Guerreros feroces y los más fuertes físicamente de todos los dragones. Sus nidos son los más belicosos de los mates. Creen que la fuerza es el argumento más honesto.",
     narrative:"En la guerra civil dracónica, los rojos fueron la punta de lanza del bando mate. En el año 1240 E.H., esa reputación todavía precede a cualquier diplomacia.",
     img:mkSVG("#180604","#C84040","R","scales")},
    {id:"r07",group:"Mate",name:"Dragón Negro",concept:"Magia Bruta · El Mejor Mago",tags:["Mate","Mago","Traición -200 A.P."],
     morph:"Escamas negras absolutas que absorben la luz. Cuando proyectan Dragohismo en registros graves, las escamas vibran con una resonancia visible. Son el clan que más modificaciones físicas sufre con el avance de la Magia.",
     culture:"Magos brutales, los mejores entre todos los magos de Rudon. Su traición en el -200 A.P. condenó a dragones aliados y sumió al planeta en décadas de guerra. La desconfianza hacia cualquier dragón negro persiste 1240 años después.",
     narrative:"Nacidos después de la traición, los negros actuales cargan una culpa que no eligieron. Esa tensión — ser sospechoso por tu escama — es uno de los conflictos más ricos del mundo.",
     img:mkSVG("#100810","#8060A0","N","crystal")},
    {id:"r08",group:"Mate",name:"Dragón Azul",concept:"Sabiduría · Vida Costera",tags:["Mate","Sabio","Calmado"],
     morph:"Escamas azul oscuro con reflejos marinos. Se ubican entre los mates de complexión media. Su Dragohismo en registros medios tiene propiedades acústicas inusuales cerca del agua, amplificadas por el medio acuático.",
     culture:"Sabios y calmados, suelen vivir cerca del mar. Son los filósofos y mediadores de los mates: frecuentemente buscan resolver conflictos que los rojos y negros han escalado. No siempre logran que los escuchen.",
     narrative:"Un clan mate que genuinamente cree en la negociación. Su existencia complica la narrativa simple de que todos los mates son belicosos.",
     img:mkSVG("#060A18","#4080C8","A","wave")},
    {id:"r09",group:"Mate",name:"Dragón Verde",concept:"Agricultura · Nutrientes Especializados",tags:["Mate","Agrícola","Neutral Comercial"],
     morph:"Escamas verde oscuro, variables del jade al musgo. Sus garras y morfología de extremidades inferiores están adaptadas para el cultivo y la cosecha con una precisión que los coloca como expertos en trabajo agrario.",
     culture:"Los mejores agrícolas y principales comerciantes de nutrientes especializados para magos. Su neutralidad política existe porque todas las facciones los necesitan y nadie quiere interrumpir el suministro.",
     narrative:"El único dragón mate al que un dragón metálico compraría algo. Su posición económica es su escudo político.",
     img:mkSVG("#061008","#40A060","V","scales")},
    {id:"r10",group:"Mate",name:"Dragón Blanco",concept:"Ciencia · Matemáticas",tags:["Mate","Científico","Matemático"],
     morph:"Escamas blancas o gris muy claro. De los mates, los de complexión más ligera y los de menor masa muscular media. Su Dragohismo es el más preciso de todos los mates en registros agudos, favoreciendo la formación de ilusiones y los cálculos de alcance.",
     culture:"Los mejores científicos y matemáticos. Los nidos blancos mantienen las bibliotecas matemáticas más avanzadas de Rudon y producen los mejores investigadores de Ethernergia cuantitativa.",
     narrative:"Los blancos son los que descubrieron que el Sello del año 0 tiene fecha de caducidad. Y son los primeros que no saben qué hacer con esa información.",
     img:mkSVG("#141418","#C8C8D8","B","circle")},
    // GEMAS
    {id:"r11",group:"Otro Dragón",name:"Dragón Diamante",concept:"Escama de Gema · Subterráneo",tags:["Gema","Subterráneo","Pocos Nidos"],
     morph:"Escamas translúcidas con la dureza y el brillo del diamante. Viven bajo montañas en estructuras hexagonales excavadas hacia abajo. La refracción de su Dragohismo en cavernas produce efectos visuales documentados solo por los investigadores de Comestio.",
     culture:"De pocos nidos, habitan debajo de montañas. La vida subterránea ha moldeado una cultura introvertida, meticulosa y desconfiada de cualquier ser que no pertenezca al nido.",
     narrative:"Los dragones más difíciles de localizar y los más reacios a participar en política dracónica. Si un Diamante abandona su montaña, el motivo es grave.",
     img:mkSVG("#101418","#B0E0FF","D","crystal")},
    {id:"r12",group:"Otro Dragón",name:"Dragón Esmeralda",concept:"Escama de Gema · Subterráneo",tags:["Gema","Subterráneo","Raros"],
     morph:"Escamas de un verde esmeralda profundo y brillante. Como todos los dragones de gema, construyen sus nidos hacia abajo. Su Dragohismo tiene una resonancia particular con la Ethernergia del subsuelo.",
     culture:"Pertenecen al grupo de los de escamas de gema, viven bajo montañas. Nidos pequeños y aislados. El Dragohismo de los esmeraldas tiene propiedades especiales en cavernas que los hacen valiosísimos como mineros de lujo.",
     narrative:"En el año -1500 A.P., los esmeraldas formaron parte del pacto de Luna con los dorados y negros para proteger a los humanos. Su firma en ese pacto todavía es objeto de debate en los nidos actuales.",
     img:mkSVG("#061208","#50C878","E","scales")},
    {id:"r13",group:"Otro Dragón",name:"Dragón Zafiro",concept:"Escama de Gema · Subterráneo",tags:["Gema","Subterráneo","Raros"],
     morph:"Escamas azul zafiro de un brillo frío y penetrante. La arquitectura de sus nidos es la más profunda documentada, algunos llevan sus estructuras hexagonales más de un kilómetro bajo tierra.",
     culture:"Como todos los dragones de gema, viven bajo montañas. Los zafiros son conocidos por sus habilidades en magia de detección: sus investigadores desarrollaron instrumentos de localización etérica usando sus escamas como resonadores.",
     narrative:"Son los dragones más informados sobre lo que ocurre en las profundidades geológicas del planeta. Si alguien puede detectar si los restos del Gran Gusano siguen activos en Dagonia, son ellos.",
     img:mkSVG("#060A18","#1E6FC8","Z","hex")},
    {id:"r14",group:"Otro Dragón",name:"Dragón Topacio",concept:"Escama de Gema · Subterráneo",tags:["Gema","Subterráneo","Raros"],
     morph:"Escamas de un amarillo dorado cálido, el más luminoso de los dragones de gema. En cavernas oscuras, un topacio adulto ilumina su entorno con el reflejo de sus propias escamas.",
     culture:"De escamas de gema, viven bajo montañas. Su Dragohismo en tonos medios tiene un efecto de revelación en la Ethernergia oculta, haciéndolos los mejores detectores de corrientes etéreas subterráneas.",
     narrative:"Los pocos investigadores que han tenido acceso a un nido de topacios reportan que el brillo de sus cavernas se percibe incluso desde las escaleras de entrada.",
     img:mkSVG("#181008","#FFC060","T","circle")},
    {id:"r15",group:"Otro Dragón",name:"Dragón Amatista",concept:"Escama de Gema · Subterráneo",tags:["Gema","Subterráneo","Raros"],
     morph:"Escamas de un morado profundo con reflejos rosáceos. El más misterioso visualmente de los dragones de gema. Su Dragohismo en tonos agudos produce efectos etéricos que algunos investigadores asocian con acceso marginal al plano de los sueños.",
     culture:"De escamas de gema, viven bajo montañas. Los amatistas mantienen la tradición de registro oral más rica de todos los de gema, con una colección de historias de las profundidades que ningún otro clan posee.",
     narrative:"Existen teorías no confirmadas de que los amatistas pueden percibir el Plano de los Sueños desde el mundo físico sin entrenamiento formal. Ningún investigador ha podido verificarlo directamente.",
     img:mkSVG("#100810","#9966CC","A","crystal")},
    {id:"r16",group:"Otro Dragón",name:"Dragón Platino",concept:"Escama Rara · Montaña Alta",tags:["Platino","Raros","Altura Extrema"],
     morph:"Escamas de un blanco platinado con iridiscencia metálica. Son pocos: quizá los dragones más escasos de Rudon después de los de Alejandrita. Viven en las cimas más altas, donde el aire es demasiado delgado para la mayoría.",
     culture:"Suelen ser pocos y viven en montañas muy altas. En el año -1100 A.P., fueron los platinos quienes enseñaron el Magosh a Logosh, el primer humano mago. Esa decisión cambió el mundo para siempre.",
     narrative:"La sombra de lo que Logosh hizo con el conocimiento que le dieron sigue definiendo cómo otros dragones miran a los platinos. ¿Fue sabiduría o fue el error más caro de la historia dracónica?",
     img:mkSVG("#141418","#E5E4E2","P","hex")},
    {id:"r17",group:"Otro Dragón",name:"Dragón Perlado",concept:"Costero · Playa y Litoral",tags:["Perlado","Costero","Playas"],
     morph:"Escamas de nácar con iridiscencia blanco-rosácea. Los únicos dragones de Rudon que han adaptado su morfología para vivir en zonas intermareales: sus extremidades inferiores tienen mayor impermeabilidad y tolerancia a la sal.",
     culture:"Suelen vivir en playas. Son los más próximos culturalmente a los dragones marinos, con quienes mantienen acuerdos de territorio. Su Dragohismo en registros medios es el más usado en ceremonias de pesca colectiva.",
     narrative:"Los perlados son los diplomáticos naturales entre el mundo terrestre y el acuático. Sin ellos, los marinos y el resto de los dragones jamás habrían llegado a un acuerdo de convivencia.",
     img:mkSVG("#0C1014","#F0EAD6","P","wave")},
    {id:"r18",group:"Otro Dragón",name:"Dragón Marino",concept:"Acuático · Bajo el Mar",tags:["Marino","4 Extremidades","Oceánico"],
     morph:"La única especie de dragón con cuatro extremidades en lugar de seis: las alas anteriores se han transformado en aletas. Escamas azul-verdosas con un brillo acuático. Pueden alcanzar tamaños mayores que sus contrapartes terrestres en aguas profundas.",
     culture:"Viven debajo del mar. Su sociedad está organizada en colonias oceánicas con rutas de migración establecidas. Su Dragohismo bajo el agua tiene propiedades acústicas completamente distintas a los registros en tierra.",
     narrative:"Casi nada se sabe de sus nidos en las profundidades. Lo poco que los investigadores de Comestio han documentado viene de los perlados, sus únicos intermediarios regulares con el mundo terrestre.",
     img:mkSVG("#04080E","#006994","M","circle")},
    {id:"r19",group:"Otro Dragón",name:"Dragón de Carbón",concept:"Mutación · Minero Especializado",tags:["Mutación","Minero","Raro"],
     morph:"Mutación rara que aparece en nidos de cualquier escama. Escamas de un negro mate opaco completamente distinto al negro brillante de los mates. Extremidades inferiores adaptadas al trabajo en roca dura con una resistencia al calor superior a cualquier otro dragón.",
     culture:"Son mutaciones raras que nacen en los nidos. Los de Carbón son buenos mineros: su Dragohismo en registros graves puede fracturar roca específica sin dañar el material adyacente.",
     narrative:"Su rareza hace que cada dragón de Carbón sea tratado como un recurso estratégico. Ningún nido que tenga uno lo admitirá públicamente.",
     img:mkSVG("#0C0C10","#708090","C","hex")},
    {id:"r20",group:"Otro Dragón",name:"Dragón de Plumas",concept:"Mutación · Explorador",tags:["Mutación","Explorador","Raro"],
     morph:"Mutación rara. En lugar de escamas, poseen plumas de una dureza similar al nácar pero con aerodinámica superior. Son los más ágiles en vuelo de todos los dragones de Rudon, capaces de ángulos de giro imposibles para sus escamados.",
     culture:"Son mutaciones raras. Los de Plumas son exploradores por naturaleza: sus nidos los envían a cartografiar territorios desconocidos y a establecer primeros contactos. Son los primeros dragones en cualquier frontera nueva.",
     narrative:"La mayoría de los mapas de Rudon fueron trazados originalmente por dragones de Plumas. Sus archivos en Comestio son la única fuente completa sobre las zonas más remotas del planeta.",
     img:mkSVG("#0C1010","#DAA520","P","wave")},
    {id:"r21",group:"Otro Dragón",name:"Dragón de Runas",concept:"Mutación · Gran Investigador",tags:["Mutación","Investigador","Raro"],
     morph:"Mutación rara. Escamas con patrones rúnicos grabados naturalmente desde el nacimiento, como si el Dragohismo hubiera quedado impreso en su piel. Cada dragón de Runas tiene un patrón único.",
     culture:"Son mutaciones raras. Los de Runas son grandes investigadores: sus escamas actúan como amplificadores naturales de Ethernergia, permitiéndoles percibir y manipular flujos etéreos con una precisión sin precedentes.",
     narrative:"Un dragón de Runas leyendo patrones etéricos ve lo que ningún instrumento puede medir. Son los únicos capaces de detectar la firma etérica mínima de un Tatorath.",
     img:mkSVG("#080C18","#7B68EE","R","crystal")},
    {id:"r22",group:"Otro Dragón",name:"Dragón Celestial",concept:"Mutación Gobernante · No Reproductivo",tags:["Mutación","5 metros","Sin Reproducción"],
     morph:"Mutación especial que aparece en la clase gobernante. Son extremadamente largos — entre cinco metros — a diferencia de los dos y medio del adulto estándar. Sabios, buenos magos, estrategas y fuertes. No pueden reproducirse.",
     culture:"Mutación especial en la clase gobernante. Su esterilidad hace que cada nacimiento de un Celestial sea tratado como un evento único e irrepetible. Sus capacidades superiores y su imposibilidad de linaje los sitúan fuera de las dinámicas políticas habituales.",
     narrative:"Un Celestial no puede tener herederos ni fundar un nido propio. Su existencia completa está dedicada a servir al nido donde nació. Esa ausencia de ambición personal los convierte en los consejeros más confiables — y en los más trágicos.",
     img:mkSVG("#0A0A18","#87CEEB","C","circle")},
    {id:"r23",group:"Otro Dragón",name:"Dragón de Papel",concept:"Origen Desconocido · Creación Mágica",tags:["Extremadamente Raro","Origen Mágico","Misterio"],
     morph:"Son extremadamente raros. Se cree que son creaciones mágicas. Su morfología sugiere un origen no biológico: las escamas tienen una textura que los investigadores describen como similar al pergamino iluminado con Ethernergia.",
     culture:"Nadie sabe quién los creó ni por qué. Los pocos registros sobre dragones de Papel provienen de observaciones indirectas: ningún investigador documentado ha tenido acceso directo a uno.",
     narrative:"Comestio tiene tres entradas sobre dragones de Papel en sus archivos. Las tres contradicen a las otras dos. La única certeza es que existen.",
     img:mkSVG("#10100C","#F5E8D0","P","hex")},
    {id:"r24",group:"Otro Dragón",name:"Dragón de Hueso",concept:"No Muerto · Inconsciente",tags:["Muerto","Inconsciente","Energía Residual"],
     morph:"Son productos de energía mágica acumulada en dragones muertos. Pero están inconscientes. Mantienen la estructura morfológica del dragón original con un color blanquecino-grisáceo y una emanación etérica que los instrumentos detectan como 'firma invertida'.",
     culture:"No tienen cultura propia: son inconscientes. Son producto de un funeral no realizado correctamente. Un dragón sin Canto Fúnebre puede convertirse en Dragón de Hueso. Por eso, el Canto no cumplido es el abandono moral más grave en la cultura dracónica.",
     narrative:"Cada Dragón de Hueso es evidencia de un nido que falló a uno de los suyos. Y según la doctrina dracónica, ese fracaso nunca prescribe.",
     img:mkSVG("#12121A","#E3DAC9","H","crystal")},
    {id:"r25",group:"Otro Dragón",name:"Dragón Alejandrita",concept:"Único Nido · Secreto de Estado",tags:["Secreto","Un Solo Nido","Alexandria"],
     morph:"Solo existió un nido, en el territorio humano llamado Alexandria. Originalmente habían muchos pero los humanos les dieron muerte. Las escamas de Alejandrita cambian de color bajo distintas condiciones de luz: púrpura en luz normal, verde en luz artificial.",
     culture:"Su único nido sobreviviente está oculto bajo el castillo de Alexandria, protegido por la familia real durante cuatrocientas generaciones. Su Dragohismo es específicamente útil contra la energía corrupta del Vacuoso.",
     narrative:"Alexander IV conoce el secreto. Sabe que dentro del castillo hay el arma más valiosa contra el Vacuoso. Y todavía no ha decidido qué hacer con esa información.",
     img:mkSVG("#0C0814","#3D9970","A","gothic")},
    // HUMANOS
    {id:"r26",group:"Humano",name:"Vayuns",concept:"Científicos · Rasgos Reptilianos",tags:["Humano","Reptiliano","Letargo Invernal"],
     morph:"Seres humanoides con rasgos reptilianos. En los meses de Criodais y Criomensi, la población Vayun entra en un estado de letargo o brumación. Sus manos tienen mayor precisión manipulativa que los Humens.",
     culture:"Grandes científicos y estudiosos de la magia, viven aislados de todos en la Gran Nación Vayun. Solo tienen contacto con Alexandria mediante el comercio. Su aislamiento es una elección, no una imposición.",
     narrative:"Los Vayun saben cosas sobre el Magosh que ningún otro pueblo humano ha documentado. La pregunta es por qué no comparten ese conocimiento — y qué haría el mundo si lo hicieran.",
     img:mkSVG("#081008","#5D8233","V","hex")},
    {id:"r27",group:"Humano",name:"Humens",concept:"Guerreros · Especie Dominante Humana",tags:["Humano","Guerrero","Lampiño"],
     morph:"Lampiños e imberbes. Son la especie humana más abundante en Rudon y la que ocupa la mayor parte del territorio humano. Constitución media, adaptada a múltiples climas. Suelen ser grandes usuarios de magia.",
     culture:"Grandes guerreros que habitan la gran parte del territorio humano. Son los fundadores de los principales reinos como Arron y Alexandria. Su diversidad interna es enorme: no existe 'el Humen típico' sino docenas de culturas.",
     narrative:"La especie que más ha cambiado el equilibrio de poder en Rudon. La pregunta no es si los Humens son peligrosos, sino si entienden lo que hacen cuando lo son.",
     img:mkSVG("#140808","#8B2500","H","scales")},
    {id:"r28",group:"Humano",name:"Nykuns",concept:"Nómadas · Invisibles para los Mihusus",tags:["Humano","Nómada","Peludo"],
     morph:"Humanoides peludos con orejas largas y cola. La cola tiene función prensil limitada y sirve como regulador de equilibrio en terreno irregular. Su pelaje les permite mimetizarse en entornos naturales con mayor facilidad que otras especies.",
     culture:"Nómadas que viven de la recolección y el comercio, adaptados a pasar desapercibidos de los Mihusus. Son el pueblo humano más conectado con los ciclos naturales de Rudon y los más resistentes a las perturbaciones etéreas ambientales.",
     narrative:"Los Nykuns llevan siglos sobreviviendo donde otros mueren. Su sabiduría sobre los Mihusus supera a cualquier estudio institucional. El problema es que esa sabiduría no está escrita.",
     img:mkSVG("#100C08","#8B6914","N","wave")},
    {id:"r29",group:"Humano",name:"Wongs",concept:"Agricultores · Brutales en Combate",tags:["Humano","Cuernos","Agricultor"],
     morph:"Humanoides con cuernos aterciopelados que crecen en pares desde la frente. Son normalmente escasos. Los cuernos no son armas sino órganos de regulación térmica y señalización social: cambian de temperatura y textura según el estado emocional.",
     culture:"Normalmente escasos, se dedican a la agricultura, pero son brutales en combates físicos. La aparente contradicción entre su vocación pacífica y su capacidad combativa refleja una cultura que valora tanto la tierra como el honor.",
     narrative:"Un Nido de Wongs que decide pelear es uno de los hechos más difíciles de revertir en Rudon. Afortunadamente para todos los demás, es también uno de los más difíciles de provocar.",
     img:mkSVG("#10100A","#B8860B","W","hex")},

     morph:"Bípedos aviarios con alas funcionales en el sistema respiratorio dual que les permite presurizar internamente para atmósferas hostiles. Plumaje adaptado a multiples climas. Visión en ultravioleta.",
     culture:"Mensajeros y exploradores. Colonias en los planetas más remotos. Los Anigodet son los primeros en llegar a cualquier sistema nuevo y los últimos en abandonarlo. Sus colonias de avanzada son las únicas fuentes de información de zonas sin cobertura cuántica.",
     narrative:"Hay colonias Anigodet en planetas de los que la Federación perdió contacto hace décadas. Nadie sabe si siguen vivos. Y nadie ha enviado a nadie a comprobarlo.",
     img:mkSVG("#080C10","#80B0E0","A","wave")},
    {id:"a11",group:"Federación",name:"Loct",concept:"Branquiadores · Ingenieros de Fluidos",tags:["Anfibio","Branquias","Reciclaje de Agua"],
     morph:"Branquiadores anfibios. Cuatro extremidades con membranas interdigitales. Pueden sobrevivir en vacío espacial hasta cuarenta minutos mediante una membrana de cierre involuntario en branquias y poros. Piel que absorbe humedad ambientalmente.",
     culture:"Ingenieros de fluidos. Diseñaron los sistemas de reciclaje de agua Mara. El módulo H3 de las naves federales, que recicla el 93% del agua a bordo, es tecnología Loct adaptada.",
     narrative:"Los Loct no tienen intereses territoriales ni ambiciones políticas. Lo que tienen es el control de los sistemas de agua de todas las naves de la Federación. En un universo donde el agua es rara, eso es un tipo diferente de poder.",
     img:mkSVG("#041010","#40B0B0","L","wave")},
    {id:"a12",group:"Federación",name:"Etio",concept:"Insectoides · Inteligencia Colectiva",tags:["Insectoide","Colectivo","Decisión Distribuida"],
     morph:"Bípedos insectoides de exoesqueleto quitinoso en coloraciones variables por clado. Antenas funcionales de comunicación química. No tienen individualidad en el sentido convencional: un Etio solo es una fracción funcional del colectivo de su clado.",
     culture:"Colonia social con inteligencia distribuida. Las decisiones son colectivas. Un individuo Etio aislado pierde capacidades cognitivas de manera progresiva: la inteligencia no reside en el individuo sino en la red.",
     narrative:"La pregunta filosófica que el Etio plantea a la Federación es insoluble: ¿puede un ser sin individualidad tener derechos individuales? Llevan sesenta años debatiéndolo sin acuerdo.",
     img:mkSVG("#0C1006","#80C040","E","hex")},
    {id:"a13",group:"Federación",name:"Rustintee",concept:"Úrsidos · Minería y Metalurgia",tags:["Cuadrúpedo","Úrsido","Mineros"],
     morph:"Cuadrúpedos úrsidos de 300-500 kg. Garras de alta resistencia adaptadas para extracción mineral. Piel de pelaje denso multiestación. La postura erguida temporal les permite manipular herramientas con sus extremidades anteriores.",
     culture:"Mineros y metalúrgicos. Proveen materiales para módulos Mara. Sin los Rustintee, la construcción de naves federales costaría tres veces más y tardaría el doble. Son invisibles en la política federal y omnipresentes en su economía.",
     narrative:"Cuando los Rustintee de un sistema deciden no trabajar, es noticia en la Junta Directiva. Cuando trabajan, nadie en la Junta sabe sus nombres.",
     img:mkSVG("#100C08","#A08060","R","scales")},
    {id:"a14",group:"Federación",name:"Jaca'Col",concept:"Cetáceos · La Cultura Oral",tags:["Cuadrúpedo","Cetáceo","Arte"],
     morph:"Cuadrúpedos con morfología derivada de cetáceos adaptados a tierra firme. Piel suave con patrones de bioluminiscencia que forman parte de su comunicación artística. Voz capaz de producir frecuencias inaudibles para la mayoría de las especies.",
     culture:"Artistas y narradores. La cultura oral más rica de la Federación. Su historia completa existe solo en su memoria colectiva cantada: no han necesitado escritura porque ningún Jaca'Col olvida una historia que ha escuchado.",
     narrative:"Los Jaca'Col saben historias sobre el universo que no están en ningún archivo federal. Y no las compartirán con quien no sepa escuchar en sus frecuencias.",
     img:mkSVG("#080C14","#6080C0","J","circle")},
    {id:"a15",group:"Federación",name:"Hoeg",concept:"Aviarios · En Transición",tags:["Aviarios","Ex-Aliados Wilstoide","Transición"],
     morph:"Humanoides aviarios con cromatismo plumoso que varía con la edad y el estatus social. Alas no funcionales para vuelo autónomo, pero desplegadas como señalización social. Dimorfismo sexual cromático pronunciado.",
     culture:"Antiguos aliados Wilstoide en proceso de integración a la Federación. La alianza con el Imperio no fue siempre voluntaria: parte de los Hoeg fue absorbida y parte colaboró. Esa distinción interna todavía genera conflictos.",
     narrative:"Para muchas especies de la Federación, un Hoeg es un antiguo colaborador del Imperio, independientemente de su historia personal. Para los Hoeg, esa generalización es lo primero que intentan corregir y lo último que logran cambiar.",
     img:mkSVG("#100C06","#C0A840","H","wave")},
    {id:"a16",group:"Imperio",name:"Aheros",concept:"Élficos Pálidos · Vasallaje Wilstoide",tags:["Wilstoide Prime","Vasallos","Warp Perdido"],
     morph:"Humanoides de rasgos élficos: altura superior al promedio, extremidades largas, orejas puntiagudas, piel de tonalidades pálidas. Fueron originalmente quienes desarrollaron el Motor Warp de manera independiente. Esa tecnología fue absorbida por los Wilstoide.",
     culture:"Especie mística. Vasallaje cultural Wilstoide. Originalmente desarrollaron el Warp, ahora perdido. Los Aheros muestran un nivel de inteligencia y capacidades tecnológicas que contrastan profundamente con su posición de vasallos perpetuos.",
     narrative:"Los Aheros inventaron el Warp antes que nadie. Los Wilstoide se lo quitaron y los convirtieron en siervos. Ese hecho, conocido pero raramente mencionado, es quizás la mayor injusticia documentada del universo.",
     img:mkSVG("#141010","#C8C0D8","A","crystal")},
    {id:"a17",group:"Imperio",name:"Wilstoide",concept:"Reptiloides · El Imperio",tags:["Reptil","Cresta Ósea","Supremacistas"],
     morph:"Bípedos reptiloides de 1,7-2,0 m. Microescamas hexagonales de beta-queratina. Cresta ósea craneal que crece toda la vida: los ancianos desarrollan estructuras de hasta cuarenta kilos. Cola robusta. Garras retráctiles de carburo de calcio con dureza 9 Mohs. Esperanza de vida 150-200 años.",
     culture:"Especie dominante del Imperio. Sus ancianos son bibliotecas vivientes veneradas por encima de cualquier institución. El Designio Escamoso está clasificado como ideología de odio en el espacio federal. Mayor castigo: la Condena a la Pluma Rota.",
     narrative:"Su mayor castigo no es la muerte sino el borrado total de todos los registros: el olvido completo. Un pueblo que venera la memoria como máximo bien tiene una filosofía coherente aunque sus consecuencias sean atroces.",
     img:mkSVG("#100A04","#C88040","W","scales")},
    {id:"a18",group:"Federación",name:"Niecta",concept:"Insectoides · Biofármacos",tags:["Hexápodo","Insectoide","Científicos"],
     morph:"Hexápodos insectoides. Dos pares de extremidades manipuladoras superiores especializadas en trabajo de precisión. Exoesqueleto con variaciones en dureza según la casta. Ciclo de muda cada tres años que incluye renovación total del sistema nervioso periférico.",
     culture:"Científicos y alquimistas. Mejores biofármacos galácticos. Sus laboratorios en el Cúmulo Niecta producen el 78% de los medicamentos de uso universal en la Federación.",
     narrative:"Los Niecta tienen el monopolio de facto de los biofármacos galácticos. No lo buscan ni lo defienden: es consecuencia de ser simplemente los mejores. Lo cual no lo hace menos problemático para quien necesita una alternativa.",
     img:mkSVG("#0A100A","#80C880","N","hex")},
    {id:"a19",group:"Federación",name:"Yoeto",concept:"Cetáceos · Orientación Espacial",tags:["Humanoide","Cetáceo","Navegantes"],
     morph:"Humanoides con morfología influenciada por ancestros cetáceos: piel suave de tono azulado-grisáceo, extremidades hidrodinámica, capacidad de apnea prolongada. Su sentido de orientación espacial es un órgano sensorial independiente sin equivalente en otras especies.",
     culture:"Navegantes con sentido de orientación espacial natural innato. No necesitan instrumentos para conocer su posición en un sistema estelar familiar: sus mapas internos son más precisos que los sistemas de navegación de primer nivel.",
     narrative:"Un Yoeto puede perderse en una ciudad pero no en una galaxia. Esa paradoja define su relación con los espacios: son los mejores pilotos del universo y los peores transeúntes urbanos.",
     img:mkSVG("#060A0C","#60A0C0","Y","wave")},
    {id:"a20",group:"Federación",name:"Arat",concept:"Úrsidos · Guerreros Honorables",tags:["Humanoide","Úrsido","Militares"],
     morph:"Humanoides úrsidos: corpulencia superior al promedio, pelaje de colores variables, garras no retráctiles. Su masa muscular hace de ellos los combatientes cuerpo a cuerpo más efectivos de las fuerzas federales.",
     culture:"Guerreros honorables. Sirven en las fuerzas militares federadas. La cultura Arat no diferencia entre servir en la flota federal y servir al honor: son la misma cosa expresada en contextos distintos.",
     narrative:"Los Arat no luchan por la Federación. Luchan por el honor, que expresan a través de la Federación. La distinción es sutil pero importa: un Arat que percibe que la Federación actúa sin honor puede dejar de servirla.",
     img:mkSVG("#0C0A08","#A08048","A","scales")},
    {id:"a21",group:"Federación",name:"Aeon",concept:"Octópodos · Filósofos Dieselpunk",tags:["Humanoide","Octópodo","Filosofía"],
     morph:"Humanoides con ocho extremidades superiores prehensiles de alta movilidad. Piel con cromatismo adaptativo. Cerebro distribuido: dos ganglios principales y seis secundarios en las extremidades. Pueden procesar ocho tareas manuales independientes simultáneamente.",
     culture:"Filósofos y académicos. La Estación Ozymandias es su obra magna. Estética dieselpunk. Su filosofía de 'el presente es el único tiempo que importa' contrasta con la obsesión de otras especies por la historia y el legado.",
     narrative:"La Estación Ozymandias es considerada la obra arquitectónica más importante del universo conocido. Fue diseñada por un Aeon que murió antes de ver su finalización. El nombre es la broma de un filósofo sobre la permanencia.",
     img:mkSVG("#0A080E","#B0A0C8","A","circle")},
    {id:"a22",group:"Federación",name:"Lunciti",concept:"Unguligrados · Ganaderos",tags:["Cuadrúpedo","Unguligrado","Terraformadores"],
     morph:"Cuadrúpedos unguligrados que comparten planeta con los Aeon. Cascos adaptados a múltiples superficies, incluyendo plataformas orbitales. Su aparato digestivo puede procesar biomasa en condiciones de microgravedad.",
     culture:"Comparten planeta con los Aeon. Ganaderos y terraformadores. Su relación con los Aeon es de complementariedad práctica: los Aeon planifican y filosofan, los Lunciti ejecutan y nutren. Es un equilibrio que lleva siglos funcionando.",
     narrative:"Los Lunciti han terraformado cuarenta y dos planetas en los últimos dos siglos. Son el motor agrícola de la Federación y los menos citados en los discursos de la Junta.",
     img:mkSVG("#080C06","#80A060","L","wave")},
    {id:"a23",group:"Federación",name:"Gipt",concept:"Insectoides · Biólogos de Campo",tags:["Humanoide","Insectoide","Atompunk"],
     morph:"Humanoides insectoides con exoesqueleto ligero y patrones de coloración que varían según el entorno. Cuatro brazos: dos para manipulación de precisión y dos para carga. Receptores químicos en los palpos para análisis biológico in situ.",
     culture:"Biólogos de campo. Expediciones científicas a rincones inexplorados. Estética atompunk. Sus equipos de campo han catalogado más de quince mil especies nuevas en los últimos siglo.",
     narrative:"Los Gipt han llegado a planetas con Ethernergia corrupta (análoga al universo de Rudon) donde ningún otro científico sobrevivía más de una semana. Sus métodos son tan efectivos como incomprensibles para otras especies.",
     img:mkSVG("#0A0E08","#A0C860","G","crystal")},
    {id:"a24",group:"Federación",name:"Digoto",concept:"Aviarios · Exploradores del Rayado",tags:["Cuadrúpedo","Aviario","Imperio Saito"],
     morph:"Cuadrúpedos aviarios con alas de membrana entre extremidades anteriores y posteriores que permiten planeo eficiente. Visión binocular frontal inusual para su morfología base. Mapa cognitivo tridimensional de alta precisión.",
     culture:"Exploradores. Primeros en mapear la galaxia Rayado. Señoríos bajo el Imperio Saito. Los Digoto fueron los cartógrafos de la expansión Saito: sus mapas abrieron rutas que el Imperio todavía usa.",
     narrative:"El Imperio Saito heredó el trabajo cartográfico de los Digoto pero no reconoció públicamente su autoría durante décadas. Ese silencio tiene consecuencias que todavía se negocian.",
     img:mkSVG("#0A0C08","#90C070","D","wave")},
    {id:"a25",group:"Federación",name:"Uteo",concept:"Mineral Cristalino · Sacrificio Colectivo",tags:["Base Silicea","Dormidos","La Joya"],
     morph:"La única civilización de base silicea conocida. Estructura cristalina mineral. Su planeta Xyren entero es un organismo único: lo que parece superficie son personas durmiendo en sacrificio colectivo.",
     culture:"Toda su civilización duerme congelada en Xyren para contener al Ente. Solo un individuo permanece despierto como representante. La Joya es un fragmento separado que lleva tres mil años emitiendo un grito continuo.",
     narrative:"Millones de personas dormidas bajo los pies de una civilización que nunca supo que caminaba sobre personas. Cuando el contenimiento falle, nadie sabe qué sale.",
     img:mkSVG("#0D1420","#85B8D8","U","crystal")},
    {id:"a26",group:"Federación",name:"Dusot",concept:"Pinnípedos · Pacifistas Absolutos",tags:["Pinnípedo","Cetáceo","Mediadores"],
     morph:"Pinnípedos adaptados parcialmente a bipedía. Cuerpo fusiforme hidrodinámico, extremidades con membranas interdigitales. Su producción de sonidos de baja frecuencia tiene efectos documentados de reducción del estrés en otras especies.",
     culture:"Pacifistas absolutos. Mediadores en conflictos interespecie. La cultura Dusot tiene prohibición absoluta de participar en conflictos armados: sus miembros son los únicos que pueden cruzar líneas de combate activo con inmunidad universal reconocida.",
     narrative:"La inmunidad Dusot funciona porque todas las partes en conflicto saben que es irreversible. Quien ataque a un Dusot en misión de mediación pierde el derecho a mediación futura. Nadie quiere ese costo.",
     img:mkSVG("#06080E","#80C0E0","D","wave")},
    {id:"a27",group:"Federación",name:"Kquiverones",concept:"Especie Joven · Gran Potencial",tags:["Humanoide","Emergente","Integración"],
     morph:"Humanoides de morfología estándar. Especie joven con gran potencial tecnológico. Su biología no tiene características radicalmente distintas de los humanos, lo que facilitó su integración inicial pero también subestimó su singularidad.",
     culture:"Especie joven con gran potencial tecnológico. Integración emergente. Los Kquiverones entraron en contacto con la Federación hace apenas ochenta años y ya han producido los ingenieros más jóvenes en alcanzar certificación estelar de primer nivel.",
     narrative:"Ochenta años de integración galáctica donde la mayoría llevan milenios. Y ya están a punto de igualar a especies con diez veces su historia estelar. Eso preocupa a algunos. Y a otros los entusiasma.",
     img:mkSVG("#0A0A10","#A0A0E0","K","hex")},
    {id:"a28",group:"Independiente",name:"Eoalo",concept:"Esfera Luminosa · Más Avanzada",tags:["Más Avanzada","Nunca Derrotada","Frecuencia Gamma"],
     morph:"Esferoides luminosos entre 0.5 y 3 metros. Apéndices de luz variable. Se desplazan mediante campos de energía que desafían las categorías físicas ordinarias. Comunicación trifrecuencial: Alpha (semántica), Beta (emocional), Gamma (desconocida).",
     culture:"La especie más avanzada tecnológicamente. Nunca derrotados. Observan sin intervenir de manera detectable. Sus advertencias son crípticas y precisas. Su Warp data de ~50.000 años AREC.",
     narrative:"¿Por qué observan y nunca intervienen? ¿Son los agujeros de gusano su creación — o su respiración? La frecuencia Gamma que solo los Espers perciben contiene algo que la Federación no puede clasificar.",
     img:mkSVG("#040C14","#40C8E0","E","circle")},
    {id:"a29",group:"Federación",name:"Esmiyuga",concept:"Vermiforme · Simbiosis Obligatoria",tags:["Simbionte","Neural","La Senda del Vínculo"],
     morph:"Vermiformes de ~40 cm. Se integran en el sistema nervioso del huésped en noventa días ampliando radicalmente sus capacidades cognitivas, sensoriales y físicas. La separación mata al huésped. Sin huésped, sus capacidades son muy limitadas.",
     culture:"Fundadores de la Senda del Vínculo. La Federación exige noventa días de espera y evaluación psicológica. Los Vinculados responden: 'La muerte también es irreversible y nadie pide consentimiento para nacer.'",
     narrative:"El debate legal sobre si el Estado puede regular un proceso completamente voluntario que solo afecta al individuo es uno de los pilares filosóficos del universo. Sesenta años sin resolución.",
     img:mkSVG("#051009","#40C880","E","wave")},
    {id:"a30",group:"Neutral",name:"Josu",concept:"Bípedos · Comerciantes del Cúmulo Penal",tags:["Goth 6-6-6","Contrabandistas","Neutral"],
     morph:"Bípedos unguligrados nativos del cúmulo penal Goth 6-6-6. Constitución robusta adaptada a condiciones de presión atmosférica variable. Sus extremidades inferiores pueden funcionar con eficiencia en gravedad desde 0.4 a 2.1g.",
     culture:"Nativos del cúmulo penal. Comerciantes y contrabandistas de renombre. En Goth 6-6-6, donde las actividades ilegales están permitidas en la mayoría de sistemas, los Josu llevan siglos siendo los intermediarios de lo que nadie más quiere tocar.",
     narrative:"Si algo no puede conseguirse por canales legales de la Federación, hay un Josu que sabe cómo conseguirlo. El precio siempre incluye discreción, pero nunca lealtad.",
     img:mkSVG("#0C0C06","#C0B060","J","hex")},
    {id:"a31",group:"Neutral",name:"Fistol",concept:"Hexápodos · Mercenarios",tags:["Hexápodo","Reptil","Guardaespaldas"],
     morph:"Hexápodos reptiloides del Cúmulo Loct. Las seis extremidades son funcionales en combate: pueden usar herramientas de manera simultánea con cuatro mientras las dos posteriores mantienen posición. Exoesqueleto ligero natural.",
     culture:"Mercenarios y guardaespaldas en los mundos del bajo espacio. Los Fistol no tienen afiliación política permanente: sirven a quien paga y cumplen el contrato completamente. Su reputación de fiabilidad contractual es su activo principal.",
     narrative:"Un Fistol bajo contrato es el guardaespaldas más fiable del universo. Un Fistol sin contrato es potencialmente lo más peligroso que puedes encontrar en el bajo espacio.",
     img:mkSVG("#080C08","#80A040","F","scales")},
    {id:"a32",group:"Federación",name:"P05-OT",concept:"Felinos · Cultura de la Caza",tags:["Cuadrúpedo","Felino","Caza como Rito"],
     morph:"Cuadrúpedos felinos del Cúmulo Viustum. Estructura muscular optimizada para aceleración explosiva y salto. Garras retráctiles de alta presión. Visión en espectros extendidos que incluyen infrarrojo cercano.",
     culture:"Cazadores. Su cultura venera la caza como rito de paso. No existe equivalente en ninguna otra especie federada de un rito de iniciación que incluya específicamente la persecución y captura de una presa designada.",
     narrative:"La integración de los P05-OT en la Federación requirió adaptar su rito de caza a entornos sintéticos. La pregunta no resuelta es si una caza simulada preserva el significado de una caza real.",
     img:mkSVG("#0C0A04","#E08040","P","wave")},
    {id:"a33",group:"Federación",name:"Maint",concept:"Humanoides Alados · Civilización Aislada",tags:["Cuernos","Alas","Cúmulo Cerrado"],
     morph:"Bípedos con cuernos de queratina hueca (termorregulación y señalización), alas cartilaginosas en las caderas que permiten vuelo real con brazos completamente libres, cola prensil de 1,2 metros. Metabolismo mixto: ectotermos de día, endotermos de noche.",
     culture:"Ingenieros talentosos. Vuelo atmosférico real. Actualmente aislados por cierre del agujero de gusano Maint. El cúmulo entero quedó incomunicado de manera abrupta y sin señales previas. Llevan décadas en silencio galáctico total.",
     narrative:"Yejekia Ben Ari, la heredera del mayor transportista del universo, tiene a su hija Esper confinada en Academia. Lo que sacrifica para salvarla define uno de los arcos más complejos del universo.",
     img:mkSVG("#0C0A1A","#9880C8","M","hex")},

// ESTRUCTURA DE MUNDOS
const WD = [
  {id:"rudon",name:"El Mundo de Rudon",genre:"Fantasía Épica · Dragones",year:"El Mundo de la Magia",color:cRudon,colorLt:cRudonLt,img:mkProj("#120A05",cRudonLt,"R"),species:rudonSpecies},
  {id:"azul",name:"Universo Planeta Azul",genre:"Ciencia Ficción Dura",year:"Furturo Lejano",color:cAzul,colorLt:cAzulLt,img:mkProj("#050A10",cAzulLt,"P"),species:azulSpecies},
  {id:"vonder",name:"Manual Vonderburg",genre:"Horror Gótico · Vampiros",year:"Universo Velum Salomonis",color:cVonder,colorLt:cVonderLt,img:mkProj("#0D0307",cVonderLt,"V"),species:vonderSpecies}
];

let CW = WD[0];
let filtered = CW.species;
let openSp = null;

function render(){
  const wr = document.getElementById("world-row");
  wr.innerHTML = WD.map(w => `<div class="wcard${CW.id===w.id?' active':''}" style="${CW.id===w.id?`border-color:${w.color};`:''}" data-id="${w.id}">
    <img class="wcard-img" src="${w.img}" alt="${w.name}"/>
    <div class="wcard-bar" style="background:${w.color};"></div>
    <div class="wcard-info">
      <div class="wcard-genre" style="color:${w.colorLt};">${w.genre}</div>
      <div class="wcard-name">${w.name}</div>
      <div class="wcard-count">${w.species.length} especies · ${w.year}</div>
    </div>
  </div>`).join("");
  document.getElementById("sx-meta").textContent = `${CW.species.length} especies catalogadas · ${CW.year}`;
  renderGrid();
  document.querySelectorAll(".wcard").forEach(el => el.addEventListener("click",()=>{
    const nw = WD.find(w=>w.id===el.dataset.id);
    if(nw && nw.id!==CW.id){ CW = nw; document.getElementById("sx-filter").value=""; filtered = CW.species; render(); }
  }));
}

function renderGrid(){
  const q = document.getElementById("sx-filter").value.toLowerCase().trim();
  filtered = q ? CW.species.filter(s => s.name.toLowerCase().includes(q) || s.concept.toLowerCase().includes(q) || s.tags.some(t=>t.toLowerCase().includes(q))) : CW.species;
  document.getElementById("sx-count").textContent = filtered.length+" / "+CW.species.length;
  const g = document.getElementById("sp-grid");
  if(!filtered.length){ g.innerHTML=`<div class="empty">Sin resultados para "${q}"</div>`; return; }
  g.innerHTML = filtered.map(sp => `<div class="spcard" data-id="${sp.id}">
    <img class="spcard-img" src="${sp.img}" alt="${sp.name}"/>
    <div class="spcard-overlay"></div>
    <div class="spcard-info">
      <div class="spcard-concept" style="color:${CW.colorLt};">${sp.concept.split("·")[0].trim()}</div>
      <div class="spcard-name">${sp.name}</div>
      <div class="tags-mini">${sp.tags.slice(0,2).map(t=>`<span class="tag-mini" style="color:${CW.colorLt};border-color:${CW.color};">${t}</span>`).join("")}</div>
    </div>
  </div>`).join("");
  document.querySelectorAll(".spcard").forEach(el => el.addEventListener("click",()=>{
    const sp = filtered.find(s=>s.id===el.dataset.id);
    if(sp) openModal(sp);
  }));
}

function openModal(sp){
  openSp = sp;
  document.getElementById("m-img").src = sp.img;
  document.getElementById("m-img").alt = sp.name;
  document.getElementById("m-bar").style.background = CW.color;
  document.getElementById("m-project").style.color = CW.colorLt;
  document.getElementById("m-project").textContent = CW.genre+" · "+CW.name;
  document.getElementById("m-name").textContent = sp.name;
  document.getElementById("m-concept").textContent = sp.concept;
  document.getElementById("m-tags").innerHTML = sp.tags.map(t=>`<span class="modal-tag" style="border-color:${CW.color};color:${CW.colorLt};">${t}</span>`).join("");
  document.getElementById("m-s1").textContent = sp.morph;
  document.getElementById("m-s2").textContent = sp.culture;
  document.getElementById("m-s3").textContent = sp.narrative;
  document.getElementById("m-l1").style.color = CW.colorLt;
  document.getElementById("m-l2").style.color = CW.colorLt;
  document.getElementById("m-l3").style.color = CW.colorLt;
  document.getElementById("modal-wrap").classList.add("open");
}
function closeModal(){ document.getElementById("modal-wrap").classList.remove("open"); openSp=null; }
document.getElementById("modal-bg").addEventListener("click",closeModal);
document.getElementById("modal-close").addEventListener("click",closeModal);
document.addEventListener("keydown",e=>{if(e.key==="Escape") closeModal();});
document.getElementById("sx-filter").addEventListener("input",renderGrid);
render();
</script>
