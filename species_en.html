<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" type="image/x-icon" href="favicon.png">
<title>Species Explorer · César Tinoco · Expanded Universe</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
  :root {
    --ink:       #0d0d0f;
    --paper:     #f5f2ec;
    --muted:     #888070;
    --rule:      rgba(245, 242, 236, 0.2);
    --rudon:     #8b4a1c;
    --rudon-lt:  #f0d5b8;
    --azul:      #1a3a5c;
    --azul-lt:   #c0d8f0;
    --vonder:    #3a1020;
    --vonder-lt: #e8c0c8;
    --accent:    #c8a860;
    --bg-sec:    #161619;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Cormorant Garamond', Georgia, serif;
    background: var(--ink);
    color: var(--paper);
    font-size: 18px;
    line-height: 1.65;
  }

  #sx { padding: 4rem 5rem; max-width: 1400px; margin: 0 auto; }
  
  .sx-hdr {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
    padding-bottom: 1rem;
    border-bottom: 2px solid var(--accent);
    margin-bottom: 2.5rem;
  }
  .sx-hdr h2 { 
    font-size: clamp(2rem, 4vw, 3.2rem); 
    font-weight: 300; 
    line-height: 1.2; 
    letter-spacing: -.01em;
    margin: 0;
  }
  .sx-hdr span { 
    font-family: 'DM Mono', monospace; 
    font-size: .75rem; 
    letter-spacing: .18em; 
    text-transform: uppercase; 
    color: var(--accent);
    align-self: flex-end;
  }
  .portfolio-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--rule);
    padding: 0.5rem 1.2rem;
    border-radius: 0;
    color: var(--paper);
    text-decoration: none;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    display: inline-block;
    align-self: center;
  }
  .portfolio-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(200, 168, 96, 0.08);
  }

  .world-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-bottom: 2.5rem; }
  .wcard { 
    cursor: pointer; background: var(--bg-sec); border: 1px solid var(--rule); 
    overflow: hidden; transition: border-color .2s, transform .2s; position: relative; 
  }
  .wcard:hover { transform: translateY(-4px); border-color: var(--muted); }
  .wcard.active { border-width: 2px; }
  .wcard-img { width: 100%; aspect-ratio: 16/7; object-fit: cover; display: block; opacity: 0.8; transition: opacity .2s; }
  .wcard:hover .wcard-img { opacity: 1; }
  .wcard-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
  .wcard-info { padding: 1.2rem 1.5rem; }
  .wcard-genre { font-family: 'DM Mono', monospace; font-size: .65rem; letter-spacing: .18em; text-transform: uppercase; margin-bottom: .4rem; }
  .wcard-name { font-size: 1.4rem; font-weight: 300; line-height: 1.2; }
  .wcard-count { font-family: 'DM Mono', monospace; font-size: .65rem; margin-top: .5rem; color: rgba(245,242,236,.6); letter-spacing: .1em; text-transform: uppercase; }

  .sx-toolbar { 
    display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; 
    background: var(--bg-sec); padding: .8rem 1.2rem; border: 1px solid var(--rule); 
  }
  .sx-filter { 
    flex: 1; background: transparent; border: none; color: var(--paper); 
    font-family: 'DM Mono', monospace; font-size: .8rem; outline: none; letter-spacing: .05em; 
  }
  .sx-filter::placeholder { color: rgba(245,242,236,.3); }
  .sx-label { font-family: 'DM Mono', monospace; font-size: .7rem; letter-spacing: .12em; text-transform: uppercase; color: var(--accent); margin-left: auto; }

  .sp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1.5rem; }
  .spcard { 
    cursor: pointer; aspect-ratio: 2/3; position: relative; overflow: hidden; 
    border: 1px solid var(--rule); transition: transform .25s, border-color .2s; background: var(--bg-sec);
  }
  .spcard:hover { transform: translateY(-4px) scale(1.02); }
  .spcard-img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .3s; opacity: 0.85; }
  .spcard:hover .spcard-img { transform: scale(1.05); opacity: 1; }
  .spcard-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(13,13,15,.95) 0%, rgba(13,13,15,.6) 40%, transparent 70%); }
  .spcard-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 1rem; }
  .spcard-concept { font-family: 'DM Mono', monospace; font-size: .55rem; letter-spacing: .12em; text-transform: uppercase; margin-bottom: .3rem; opacity: .9; }
  .spcard-name { font-size: 1.1rem; font-weight: 400; line-height: 1.2; margin-bottom: .5rem; }
  .tags-mini { display: flex; gap: .3rem; flex-wrap: wrap; }
  .tag-mini { font-family: 'DM Mono', monospace; font-size: .5rem; letter-spacing: .08em; padding: .15rem .4rem; border: 1px solid; opacity: .8; text-transform: uppercase; }

  .modal-wrap { display: none; position: fixed; inset: 0; z-index: 1000; align-items: center; justify-content: center; padding: 2rem; }
  .modal-wrap.open { display: flex; animation: fadeIn .2s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal-bg { position: absolute; inset: 0; background: rgba(0,0,0,.9); cursor: zoom-out; }
  .modal-box { 
    position: relative; z-index: 1; display: flex; width: 100%; max-width: 900px; max-height: 85vh; 
    background: var(--ink); border: 1px solid var(--rule); overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
  }
  .modal-img-wrap { width: 35%; flex-shrink: 0; position: relative; background: var(--bg-sec); }
  .modal-img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0.9; filter: grayscale(15%); }
  .modal-body { flex: 1; overflow-y: auto; padding: 3rem 4rem; }
  .modal-project { font-family: 'DM Mono', monospace; font-size: .68rem; letter-spacing: .18em; text-transform: uppercase; margin-bottom: .8rem; }
  .modal-name { font-size: clamp(2rem, 3vw, 2.8rem); font-weight: 300; line-height: 1.1; margin-bottom: .8rem; letter-spacing: -.01em; }
  .modal-concept { font-size: 1.12rem; font-style: italic; color: rgba(245,242,236,.65); margin-bottom: 1.5rem; line-height: 1.6; }
  .modal-tags { display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: 2.5rem; }
  .modal-tag { font-family: 'DM Mono', monospace; font-size: .65rem; letter-spacing: .1em; text-transform: uppercase; padding: .3rem .8rem; border: 1px solid; }
  .modal-divider { border-top: 1px solid var(--rule); margin: 2rem 0; height: 0; }
  .modal-section { margin-bottom: 1.8rem; }
  .modal-sec-label { font-family: 'DM Mono', monospace; font-size: .7rem; letter-spacing: .14em; text-transform: uppercase; margin-bottom: .8rem; padding-bottom: .4rem; border-bottom: 1px solid var(--rule); color: var(--muted); }
  .modal-sec-body { font-size: 1rem; line-height: 1.65; color: rgba(245,242,236,.85); }
  .modal-close { position: absolute; top: 1.2rem; right: 1.5rem; background: none; border: none; font-size: 2.5rem; cursor: pointer; color: var(--paper); line-height: 1; z-index: 2; font-family: 'DM Mono', monospace; opacity: .6; transition: opacity .2s; }
  .modal-close:hover { opacity: 1; }
  .empty { padding: 4rem 2rem; text-align: center; font-family: 'DM Mono', monospace; font-size: .8rem; letter-spacing: .1em; color: var(--muted); text-transform: uppercase; }

  @media (max-width: 900px) {
    #sx { padding: 2rem 1.5rem; }
    .world-row { grid-template-columns: 1fr; }
    .modal-box { flex-direction: column; overflow-y: auto; }
    .modal-img-wrap { width: 100%; height: 200px; }
    .modal-body { padding: 2rem 1.5rem; overflow-y: visible; }
    .modal-close { top: .5rem; right: .8rem; }
    .sx-hdr {
      flex-direction: column;
      align-items: stretch;
    }
    .portfolio-btn {
      align-self: flex-start;
    }
  }
</style>
</head>
<body>

<div id="sx">
  <div class="sx-hdr">
    <h2>Species Explorer</h2>
    <a href="index.html" class="portfolio-btn">Portfolio</a>
    <a href="species_es.html" class="portfolio-btn">Español</a>
    <span id="sx-meta"></span>
  </div>
  <div class="world-row" id="world-row"></div>
  <div class="sx-toolbar">
    <input class="sx-filter" id="sx-filter" placeholder="Search species, concept or trait…"/>
    <span class="sx-label" id="sx-count"></span>
  </div>
  <div class="sp-grid" id="sp-grid"></div>
  <div class="modal-wrap" id="modal-wrap">
    <div class="modal-bg" id="modal-bg"></div>
    <div class="modal-box" id="modal-box">
      <div class="modal-img-wrap">
        <img class="modal-img" id="m-img" src="" alt=""/>
        <div id="m-bar" style="position:absolute;left:0;top:0;bottom:0;width:6px;"></div>
      </div>
      <div class="modal-body">
        <div class="modal-project" id="m-project"></div>
        <div class="modal-name" id="m-name"></div>
        <div class="modal-concept" id="m-concept"></div>
        <div class="modal-tags" id="m-tags"></div>
        <div class="modal-section"><div class="modal-sec-label" id="m-l1">Morphology / Biology</div><div class="modal-sec-body" id="m-s1"></div></div>
        <div class="modal-section"><div class="modal-sec-label" id="m-l2">Culture & Society</div><div class="modal-sec-body" id="m-s2"></div></div>
        <div class="modal-section"><div class="modal-sec-label" id="m-l3">Narrative Role</div><div class="modal-sec-body" id="m-s3"></div></div>
      </div>
      <button class="modal-close" id="modal-close" title="Close">×</button>
    </div>
  </div>
</div>

<script>
// ======================== SVG UTILITIES ==========================
function mkSVG(bg,ac,lt,pat="hex"){
  const P={
    scales:`<path d="M55,55 Q105,30 155,55 Q205,30 255,55" fill="none" stroke="${ac}" stroke-width="1.5" opacity=".3"/><path d="M35,92 Q85,67 135,92 Q185,67 235,92 Q280,67 300,92" fill="none" stroke="${ac}" stroke-width="1.4" opacity=".2"/><path d="M55,128 Q105,103 155,128 Q205,103 255,128" fill="none" stroke="${ac}" stroke-width="1.2" opacity=".15"/>`,
    hex:`<polygon points="150,22 218,60 218,138 150,176 82,138 82,60" fill="none" stroke="${ac}" stroke-width="1.2" opacity=".3"/><polygon points="150,52 198,78 198,132 150,158 102,132 102,78" fill="none" stroke="${ac}" stroke-width=".8" opacity=".15"/>`,
    circle:`<circle cx="150" cy="105" r="72" fill="none" stroke="${ac}" stroke-width="1.2" opacity=".3"/><circle cx="150" cy="105" r="46" fill="none" stroke="${ac}" stroke-width=".8" opacity=".2"/><circle cx="150" cy="105" r="20" fill="${ac}" opacity=".15"/>`,
    crystal:`<polygon points="150,14 196,78 185,168 115,168 104,78" fill="none" stroke="${ac}" stroke-width="1.2" opacity=".3"/><line x1="127" y1="14" x2="150" y2="168" stroke="${ac}" stroke-width=".6" opacity=".15"/><line x1="173" y1="14" x2="150" y2="168" stroke="${ac}" stroke-width=".6" opacity=".15"/>`,
    wave:`<path d="M36,86 Q78,50 118,86 Q160,122 202,86 Q244,50 276,86" fill="none" stroke="${ac}" stroke-width="1.5" opacity=".3"/><path d="M36,118 Q78,82 118,118 Q160,154 202,118 Q244,82 276,118" fill="none" stroke="${ac}" stroke-width="1" opacity=".2"/>`,
    gothic:`<path d="M150,18 L170,58 L202,58 L178,80 L188,114 L150,93 L112,114 L122,80 L98,58 L130,58 Z" fill="none" stroke="${ac}" stroke-width="1.2" opacity=".3"/><rect x="134" y="58" width="32" height="52" fill="none" stroke="${ac}" stroke-width=".8" opacity=".15" rx="16"/>`
  };
  const s=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 380"><rect width="300" height="380" fill="${bg}"/><rect width="300" height="380" fill="${ac}" opacity=".08"/>${P[pat]||P.hex}<text x="150" y="245" font-family="Georgia,serif" font-size="70" font-weight="bold" text-anchor="middle" fill="${ac}" opacity=".2">${lt}</text><rect x="0" y="0" width="5" height="380" fill="${ac}" opacity=".85"/></svg>`;
  return "data:image/svg+xml,"+encodeURIComponent(s);
}
function mkProj(bg,ac,lbl){
  const s=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220"><rect width="600" height="220" fill="${bg}"/><text x="300" y="130" font-family="Georgia,serif" font-size="100" font-weight="bold" text-anchor="middle" fill="${ac}" opacity=".15">${lbl}</text><rect x="0" y="0" width="7" height="220" fill="${ac}" opacity=".9"/><text x="28" y="192" font-family="monospace" font-size="8" fill="${ac}" opacity=".4" letter-spacing="3">PROJECT IMAGE</text></svg>`;
  return "data:image/svg+xml,"+encodeURIComponent(s);
}
const cRudon = "#8b4a1c", cRudonLt = "#f0d5b8";
const cAzul = "#1a3a5c", cAzulLt = "#c0d8f0";
const cVonder = "#3a1020", cVonderLt = "#e8c0c8";

// ========== COMPLETE DATA FROM THE THREE DOCUMENTS ==========
// RUDON UNIVERSE (dragons, humans, intelligent creatures)
const rudonSpecies = [
    // METALLIC
    {id:"r01",group:"Metallic",name:"Golden Dragon",concept:"Leadership · Natural Leader",tags:["Metallic","Ruler","Kings"],
     morph:"Scales of bright, uniform gold that intensify their luster with age. Adults measure up to 2.5 meters in bipedal stance. Six limbs. Golden-scaled queens reach ten meters and can no longer fly.",
     culture:"Natural and wise leaders. They are the most coveted dragons as kings of other nests: sent as princes to foreign nests, their genetics and talent for governance make them the most sought-after administrators in all of Rudon.",
     narrative:"The faction with the greatest political influence in Rudon's affairs. The world's fate passes through their decisions more than many would care to admit.",
     img:mkSVG("#1A1000","#D4AF37","D","scales")},
    {id:"r02",group:"Metallic",name:"Silver Dragon",concept:"Magical Skill · Historiography",tags:["Metallic","Historian","Mage"],
     morph:"Scales of polished silver with cold reflections. Shares the standard hexapod build of metallic dragons. Clear, projected voice, decisive for Draconic in historical and archival records.",
     culture:"Skilled in magic and excellent historians. They are the guardians of draconic collective memory. Their archives in Comestio are the most complete and most protected in the world.",
     narrative:"The history they know and the history they choose not to record are equally powerful. Silver silences carry as much narrative weight as their chronicles.",
     img:mkSVG("#10101A","#C0C0C8","P","hex")},
    {id:"r03",group:"Metallic",name:"Bronze Dragon",concept:"Tactics · Battle Expert",tags:["Metallic","Warrior","Strategist"],
     morph:"Scales of warm bronze with slightly darker edges. Somewhat sturdier build than the metallic average, with developed wing musculature favoring quick maneuvers in aerial combat.",
     culture:"Experts in battles and tactics. Bronze nests maintain their own military academies, and their guardians are the most sought-after in clan conflicts. They rule Rudon's aerial combat.",
     narrative:"They are the most active component of any draconic military coalition. When the bronzes move, someone has decided that diplomacy has already failed.",
     img:mkSVG("#160C04","#CD7F32","B","scales")},
    {id:"r04",group:"Metallic",name:"Ochre Dragon",concept:"Construction · Agriculture",tags:["Metallic","Builder","Worker"],
     morph:"Scales of yellowish-brown terracotta, earthy with a slightly rough texture. Lower limbs more robust than other metallics, adapted for ground work and material hauling.",
     culture:"Good builders and farmers. They are responsible for metallic nests having the strongest infrastructures and most stable supplies. Their work is invisible until it is missing.",
     narrative:"War is not won only in the air. The ochres are the ones who make it possible for everyone else to fight.",
     img:mkSVG("#160E06","#C19A6B","O","hex")},
    {id:"r05",group:"Metallic",name:"Copper Dragon",concept:"Diplomacy · Trade",tags:["Metallic","Diplomat","Merchant"],
     morph:"Scales of reddish-orange copper with warm glints. Physically similar to the metallic average, they stand out for vocal agility that favors persuasive Draconic and agreement records.",
     culture:"Highly diplomatic and great merchants. They are the natural intermediaries between nests, between species, and between factions. Their commercial neutrality is both a tool and a philosophy.",
     narrative:"Without the coppers, half the pacts between dragons and humans would never have existed. And without them, no one would know.",
     img:mkSVG("#140A04","#B87333","C","circle")},
    // MATTE
    {id:"r06",group:"Matte",name:"Red Dragon",concept:"Brute Strength · Fierce Warrior",tags:["Matte","Warrior","Strongest"],
     morph:"Matte-finish red scales, thicker than those of any other dragon. The most massive build among mattes. The physical advantage of an adult red over any human is absolute.",
     culture:"Fierce warriors and the physically strongest of all dragons. Their nests are the most warlike among the mattes. They believe strength is the most honest argument.",
     narrative:"In the draconic civil war, the reds were the spearhead of the matte faction. In the year 1240 A.H., that reputation still precedes any diplomacy.",
     img:mkSVG("#180604","#C84040","R","scales")},
    {id:"r07",group:"Matte",name:"Black Dragon",concept:"Raw Magic · The Best Mage",tags:["Matte","Mage","Betrayal -200 A.P."],
     morph:"Absolute black scales that absorb light. When they project Draconic in low registers, the scales vibrate with visible resonance. They are the clan that suffers the most physical modifications as Magic advances.",
     culture:"Brutal mages, the best among all Rudon's mages. Their betrayal in -200 A.P. doomed allied dragons and plunged the planet into decades of war. Distrust toward any black dragon persists 1240 years later.",
     narrative:"Born after the betrayal, today's blacks carry a guilt they did not choose. That tension — being suspect because of your scale — is one of the world's richest conflicts.",
     img:mkSVG("#100810","#8060A0","N","crystal")},
    {id:"r08",group:"Matte",name:"Blue Dragon",concept:"Wisdom · Coastal Life",tags:["Matte","Sage","Calm"],
     morph:"Dark blue scales with marine reflections. They fall among the medium-build mattes. Their Draconic in mid registers has unusual acoustic properties near water, amplified by the aquatic medium.",
     culture:"Wise and calm, they often live near the sea. They are the philosophers and mediators of the mattes: frequently seeking to resolve conflicts that reds and blacks have escalated. They don't always succeed in being heard.",
     narrative:"A matte clan that genuinely believes in negotiation. Their existence complicates the simple narrative that all mattes are warlike.",
     img:mkSVG("#060A18","#4080C8","A","wave")},
    {id:"r09",group:"Matte",name:"Green Dragon",concept:"Agriculture · Specialized Nutrients",tags:["Matte","Agricultural","Commercial Neutral"],
     morph:"Dark green scales, varying from jade to moss. Their claws and lower-limb morphology are adapted for farming and harvesting with precision that makes them experts in agricultural work.",
     culture:"The best agriculturalists and main traders in specialized nutrients for mages. Their political neutrality exists because all factions need them and no one wants to interrupt the supply.",
     narrative:"The only matte dragon from which a metallic dragon would buy anything. Their economic position is their political shield.",
     img:mkSVG("#061008","#40A060","V","scales")},
    {id:"r10",group:"Matte",name:"White Dragon",concept:"Science · Mathematics",tags:["Matte","Scientist","Mathematician"],
     morph:"White or very light gray scales. Among the mattes, the lightest build and the lowest average muscle mass. Their Draconic is the most precise among mattes in high registers, favoring illusion formation and range calculations.",
     culture:"The best scientists and mathematicians. White nests maintain Rudon's most advanced mathematical libraries and produce the best researchers in quantitative Ethernergy.",
     narrative:"The whites are the ones who discovered that the Seal of year 0 has an expiration date. And they are the first who don't know what to do with that information.",
     img:mkSVG("#141418","#C8C8D8","B","circle")},
    // GEMS
    {id:"r11",group:"Other Dragon",name:"Diamond Dragon",concept:"Gem Scale · Subterranean",tags:["Gem","Subterranean","Few Nests"],
     morph:"Translucent scales with the hardness and brilliance of diamond. They live under mountains in hexagonal structures excavated downward. The refraction of their Draconic in caves produces visual effects documented only by Comestio researchers.",
     culture:"Few in number, they dwell beneath mountains. Underground life has shaped an introverted, meticulous culture distrustful of any being outside the nest.",
     narrative:"The hardest dragons to locate and the most reluctant to engage in draconic politics. If a Diamond leaves its mountain, the reason is grave.",
     img:mkSVG("#101418","#B0E0FF","D","crystal")},
    {id:"r12",group:"Other Dragon",name:"Emerald Dragon",concept:"Gem Scale · Subterranean",tags:["Gem","Subterranean","Rare"],
     morph:"Scales of deep, brilliant emerald green. Like all gem dragons, they build their nests downward. Their Draconic has a particular resonance with subsurface Ethernergy.",
     culture:"They belong to the gem-scaled group, living under mountains. Small, isolated nests. The Draconic of emeralds has special properties in caves that make them highly valuable as luxury miners.",
     narrative:"In the year -1500 A.P., the emeralds were part of the Luna pact with the golds and blacks to protect humans. Their signature on that pact is still debated in today's nests.",
     img:mkSVG("#061208","#50C878","E","scales")},
    {id:"r13",group:"Other Dragon",name:"Sapphire Dragon",concept:"Gem Scale · Subterranean",tags:["Gem","Subterranean","Rare"],
     morph:"Sapphire blue scales with a cold, penetrating shine. Their nest architecture is the deepest documented, with some extending their hexagonal structures more than a kilometer underground.",
     culture:"Like all gem dragons, they live under mountains. Sapphires are known for their detection magic abilities: their researchers developed ethereal location instruments using their scales as resonators.",
     narrative:"They are the dragons most informed about what happens in the planet's geological depths. If anyone can detect whether the Great Worm's remains are still active in Dagonia, it is them.",
     img:mkSVG("#060A18","#1E6FC8","Z","hex")},
    {id:"r14",group:"Other Dragon",name:"Topaz Dragon",concept:"Gem Scale · Subterranean",tags:["Gem","Subterranean","Rare"],
     morph:"Scales of warm golden-yellow, the brightest of the gem dragons. In dark caverns, an adult topaz illuminates its surroundings with the reflection of its own scales.",
     culture:"Gem-scaled, living under mountains. Their mid-tone Draconic has a revealing effect on hidden Ethernergy, making them the best detectors of subterranean ethereal currents.",
     narrative:"The few researchers who have accessed a topaz nest report that the glow of their caverns can be perceived even from the entrance stairs.",
     img:mkSVG("#181008","#FFC060","T","circle")},
    {id:"r15",group:"Other Dragon",name:"Amethyst Dragon",concept:"Gem Scale · Subterranean",tags:["Gem","Subterranean","Rare"],
     morph:"Scales of deep purple with pinkish reflections. Visually the most mysterious of the gem dragons. Their high-register Draconic produces ethereal effects that some researchers associate with marginal access to the dream plane.",
     culture:"Gem-scaled, living under mountains. Amethysts maintain the richest oral recording tradition of all gems, with a collection of deep-earth stories that no other clan possesses.",
     narrative:"Unconfirmed theories exist that amethysts can perceive the Dream Plane from the physical world without formal training. No researcher has been able to verify it directly.",
     img:mkSVG("#100810","#9966CC","A","crystal")},
    {id:"r16",group:"Other Dragon",name:"Platinum Dragon",concept:"Rare Scale · High Mountain",tags:["Platinum","Rare","Extreme Altitude"],
     morph:"Scales of platinumed white with metallic iridescence. They are few: perhaps Rudon's rarest dragons after the Alexandrites. They live on the highest peaks, where the air is too thin for most.",
     culture:"Usually few in number and dwell in very high mountains. In the year -1100 A.P., it was the platinums who taught Magosh to Logosh, the first human mage. That decision changed the world forever.",
     narrative:"The shadow of what Logosh did with the knowledge they gave him still defines how other dragons look at platinums. Was it wisdom or the most expensive mistake in draconic history?",
     img:mkSVG("#141418","#E5E4E2","P","hex")},
    {id:"r17",group:"Other Dragon",name:"Pearl Dragon",concept:"Coastal · Beach and Shore",tags:["Pearl","Coastal","Beaches"],
     morph:"Nacreous scales with white-pinkish iridescence. The only Rudon dragons to have adapted their morphology to live in intertidal zones: their lower limbs have greater impermeability and salt tolerance.",
     culture:"They usually live on beaches. They are the closest culturally to sea dragons, with whom they maintain territorial agreements. Their mid-register Draconic is the most used in collective fishing ceremonies.",
     narrative:"Pearls are the natural diplomats between the terrestrial and aquatic worlds. Without them, sea dragons and the rest would never have reached a coexistence agreement.",
     img:mkSVG("#0C1014","#F0EAD6","P","wave")},
    {id:"r18",group:"Other Dragon",name:"Sea Dragon",concept:"Aquatic · Under the Sea",tags:["Marine","4 Limbs","Oceanic"],
     morph:"The only dragon species with four limbs instead of six: the forewings have transformed into fins. Bluish-green scales with an aquatic sheen. They can reach larger sizes than their terrestrial counterparts in deep waters.",
     culture:"They live under the sea. Their society is organized into oceanic colonies with established migration routes. Their underwater Draconic has acoustic properties completely different from land-based registers.",
     narrative:"Almost nothing is known of their deep-sea nests. The little that Comestio researchers have documented comes from the pearls, their only regular intermediaries with the terrestrial world.",
     img:mkSVG("#04080E","#006994","M","circle")},
    {id:"r19",group:"Other Dragon",name:"Coal Dragon",concept:"Mutation · Specialized Miner",tags:["Mutation","Miner","Rare"],
     morph:"Rare mutation appearing in nests of any scale. Dull, opaque black scales completely different from the glossy black of mattes. Lower limbs adapted for hard rock work with heat resistance superior to any other dragon.",
     culture:"They are rare mutations born in nests. Coals are good miners: their low-register Draconic can fracture specific rock without damaging adjacent material.",
     narrative:"Their rarity makes every Coal dragon treated as a strategic resource. No nest that has one will admit it publicly.",
     img:mkSVG("#0C0C10","#708090","C","hex")},
    {id:"r20",group:"Other Dragon",name:"Feather Dragon",concept:"Mutation · Explorer",tags:["Mutation","Explorer","Rare"],
     morph:"Rare mutation. Instead of scales, they possess feathers with hardness similar to nacre but superior aerodynamics. They are the most agile in flight of all Rudon's dragons, capable of turn angles impossible for their scaled kin.",
     culture:"They are rare mutations. Feathers are explorers by nature: their nests send them to map unknown territories and establish first contacts. They are the first dragons on any new frontier.",
     narrative:"Most of Rudon's maps were originally charted by Feather dragons. Their archives in Comestio are the only complete source on the planet's most remote areas.",
     img:mkSVG("#0C1010","#DAA520","P","wave")},
    {id:"r21",group:"Other Dragon",name:"Rune Dragon",concept:"Mutation · Great Researcher",tags:["Mutation","Researcher","Rare"],
     morph:"Rare mutation. Scales with naturally engraved runic patterns from birth, as if Draconic had been imprinted on their skin. Each Rune dragon has a unique pattern.",
     culture:"They are rare mutations. Runes are great researchers: their scales act as natural Ethernergy amplifiers, allowing them to perceive and manipulate ethereal flows with unprecedented precision.",
     narrative:"A Rune dragon reading ethereal patterns sees what no instrument can measure. They are the only ones capable of detecting the minimal ethereal signature of a Tatorath.",
     img:mkSVG("#080C18","#7B68EE","R","crystal")},
    {id:"r22",group:"Other Dragon",name:"Celestial Dragon",concept:"Ruler Mutation · Non-Reproductive",tags:["Mutation","5 meters","No Reproduction"],
     morph:"Special mutation appearing in the ruling class. They are extremely long — about five meters — unlike the standard adult's two and a half. Wise, good mages, strategists, and strong. They cannot reproduce.",
     culture:"Special mutation in the ruling class. Their sterility makes each birth of a Celestial treated as a unique, unrepeatable event. Their superior abilities and impossibility of lineage place them outside normal political dynamics.",
     narrative:"A Celestial cannot have heirs or found its own nest. Its entire existence is dedicated to serving the nest where it was born. That absence of personal ambition makes them the most trusted advisors — and the most tragic.",
     img:mkSVG("#0A0A18","#87CEEB","C","circle")},
    {id:"r23",group:"Other Dragon",name:"Paper Dragon",concept:"Unknown Origin · Magical Creation",tags:["Extremely Rare","Magical Origin","Mystery"],
     morph:"They are extremely rare. Believed to be magical creations. Their morphology suggests a non-biological origin: the scales have a texture researchers describe as similar to Ethernergy-illuminated parchment.",
     culture:"No one knows who created them or why. The few records of Paper dragons come from indirect observations: no documented researcher has had direct access to one.",
     narrative:"Comestio has three entries on Paper dragons in its archives. All three contradict the other two. The only certainty is that they exist.",
     img:mkSVG("#10100C","#F5E8D0","P","hex")},
    {id:"r24",group:"Other Dragon",name:"Bone Dragon",concept:"Undead · Unconscious",tags:["Dead","Unconscious","Residual Energy"],
     morph:"They are products of magical energy accumulated in dead dragons. But they are unconscious. They retain the morphological structure of the original dragon with a whitish-grayish color and an ethereal emanation that instruments detect as an 'inverted signature'.",
     culture:"They have no culture of their own: they are unconscious. They are the product of a funeral not performed correctly. A dragon without a Death Dirge can become a Bone dragon. That is why an unfulfilled Dirge is the most serious moral abandonment in draconic culture.",
     narrative:"Every Bone dragon is evidence of a nest that failed one of its own. And according to draconic doctrine, that failure never expires.",
     img:mkSVG("#12121A","#E3DAC9","H","crystal")},
    {id:"r25",group:"Other Dragon",name:"Alexandrite Dragon",concept:"Single Nest · State Secret",tags:["Secret","One Nest","Alexandria"],
     morph:"Only one nest ever existed, in the human territory called Alexandria. Originally there were many, but humans killed them. Alexandrite scales change color under different lighting conditions: purple in normal light, green in artificial light.",
     culture:"Their only surviving nest is hidden beneath Alexandria's castle, protected by the royal family for four hundred generations. Their Draconic is specifically useful against the corrupt energy of the Void.",
     narrative:"Alexander IV knows the secret. He knows that inside the castle lies the most valuable weapon against the Void. And he has not yet decided what to do with that information.",
     img:mkSVG("#0C0814","#3D9970","A","gothic")},
    // HUMANS
    {id:"r26",group:"Human",name:"Vayuns",concept:"Scientists · Reptilian Traits",tags:["Human","Reptilian","Winter Lethargy"],
     morph:"Humanoid beings with reptilian traits. During the months of Criodais and Criomensi, the Vayun population enters a state of lethargy or brumation. Their hands have greater manipulative precision than Humens.",
     culture:"Great scientists and scholars of magic, living isolated from all others in the Great Vayun Nation. They only have contact with Alexandria through trade. Their isolation is a choice, not an imposition.",
     narrative:"The Vayuns know things about Magosh that no other human people have documented. The question is why they don't share that knowledge — and what the world would do if they did.",
     img:mkSVG("#081008","#5D8233","V","hex")},
    {id:"r27",group:"Human",name:"Humens",concept:"Warriors · Dominant Human Species",tags:["Human","Warrior","Hairless"],
     morph:"Hairless and beardless. They are the most abundant human species in Rudon and occupy most human territory. Medium build, adapted to multiple climates. They tend to be heavy magic users.",
     culture:"Great warriors inhabiting most human territory. They are the founders of major kingdoms like Arron and Alexandria. Their internal diversity is enormous: there is no 'typical Humen' but dozens of cultures.",
     narrative:"The species that has most changed the balance of power in Rudon. The question is not whether Humens are dangerous, but whether they understand what they are doing when they are.",
     img:mkSVG("#140808","#8B2500","H","scales")},
    {id:"r28",group:"Human",name:"Nykuns",concept:"Nomads · Invisible to Mihusus",tags:["Human","Nomad","Furry"],
     morph:"Hairy humanoids with long ears and a tail. The tail has limited prehensile function and serves as a balance regulator on uneven terrain. Their fur allows them to blend into natural environments more easily than other species.",
     culture:"Nomads living off foraging and trade, adapted to go unnoticed by the Mihusus. They are the human people most connected to Rudon's natural cycles and most resistant to environmental ethereal disturbances.",
     narrative:"The Nykuns have survived for centuries where others die. Their wisdom about the Mihusus surpasses any institutional study. The problem is that wisdom is not written down.",
     img:mkSVG("#100C08","#8B6914","N","wave")},
    {id:"r29",group:"Human",name:"Wongs",concept:"Farmers · Brutal in Combat",tags:["Human","Horns","Farmer"],
     morph:"Humanoids with velvety horns growing in pairs from the forehead. They are normally scarce. The horns are not weapons but organs for thermoregulation and social signaling: they change temperature and texture according to emotional state.",
     culture:"Normally scarce, they dedicate themselves to agriculture, but are brutal in physical combat. The apparent contradiction between their peaceful vocation and their combat capability reflects a culture that values both the land and honor.",
     narrative:"A Wong Nest that decides to fight is one of the hardest events to reverse in Rudon. Fortunately for everyone else, it is also one of the hardest to provoke.",
     img:mkSVG("#10100A","#B8860B","W","hex")},
  ];

// PLANETA AZUL UNIVERSE (all intelligent species from the catalogue)
const azulSpecies = [
    {id:"a01",group:"Federation",name:"Humans",concept:"Founders · Anchor Species",tags:["Founders","Federation","Adaptable"],
     morph:"Humanoid, simian. The morphological reference species for most federal treaties. The most studied biology in the known universe precisely because they are the creators of the documentation system.",
     culture:"Founders of the Federation. Expansive, adaptable, politically complex. The Federation is of human origin, with all that implies in terms of institutional bias that other species frequently point out.",
     narrative:"They are not the most powerful nor the most intelligent, but they are the most adaptable and the ones who built the system. Which also means they are the ones who best know how to break it.",

    {id:"a02",group:"Federation",name:"Gotat",concept:"Facial Exoskeleton · First Ally",tags:["First Ally","Exoskeleton","Hemocyanin"],
     morph:"Bipeds 1.6 to 1.9 m. Facial exoskeleton: bone plate covering the upper half of the skull, polished ivory texture with black iridescent blue-purple veins with age. Cartilaginous ears 15-20 cm, mobile. Earthy skin with chameleonic mottling. Bluish blood. Regional ectotherms.",
     culture:"First human allied species. After an initial war, they signed a cooperation agreement. They are historic allies of the Federation and the most institutionally integrated.",
     narrative:"The Human-Gotat alliance was the first and remains the strongest. What is not said publicly is that it began with an armed conflict that the Gotat won.",
     img:mkSVG("#0A0C18","#9090C0","G","hex")},
    {id:"a03",group:"Federation",name:"Manton",concept:"Cervids · Liberated from Wilstoid Yoke",tags:["L0L0 8-5","Cervids","Liberated"],
     morph:"Humanoids with cervid features: antlers, soft fur, and lower limbs adapted for open-field running. They are upright bipeds in social contexts and adopt quadrupedalism at maximum speed.",
     culture:"Liberated from the Wilstoid yoke. Peaceful, agricultural culture. The trauma of enslavement still defines their political structures: they distrust any hierarchy that reminds them of what they suffered.",
     narrative:"The memory of the Wilstoid Empire is not history for the Manton: it is present politics. Every negotiation with a Wilstoid activates memories that their institutions have not yet processed.",
     img:mkSVG("#081008","#80C080","M","wave")},
    {id:"a04",group:"Federation",name:"Waltean",concept:"Canines · Repurposed Hunters",tags:["L0L0 8-5","Canines","Honor"],
     morph:"Humanoids with canine features: short snout, erect ears, dense fur, and expressive tail. Their retractable claws and jaw structure are vestiges of a predator biology that space domestication has not eliminated.",
     culture:"Hunters repurposed as stellar explorers. Strong sense of honor. Their ethical hunting code has evolved into a formal honor system that regulates everything from trade negotiations to armed conflicts.",
     narrative:"For a Waltean, a word given in an honor agreement is more binding than any federal contract. That makes them reliable and inflexible at the same time.",
     img:mkSVG("#0A0808","#C0A060","W","hex")},
    {id:"a05",group:"Federation",name:"Kitoran",concept:"Felines · Natural Diplomats",tags:["L0L0 8-5","Felines","Mediators"],
     morph:"Feline humanoids: pointed ears, vertical pupils, superior reflexes, and a long balancing tail. Marked sexual dimorphism. Their facial muscles allow an expressive range that makes their body language extremely readable for other species.",
     culture:"Natural diplomats. Their mediators are recognized throughout the Federation. The origin of this skill is not innate benevolence, but that in their pre-contact history, diplomacy was the only alternative to extinction.",
     narrative:"The most famous Kitoran mediator negotiated the ceasefire of the Second Wilstoid War without speaking the language of either side. He did it by reading his delegates' body language.",
     img:mkSVG("#100A04","#E0A840","K","circle")},
    {id:"a06",group:"Federation",name:"Roptus",concept:"Elephantids · Federation Engineers",tags:["L0L0 8-5","Elephantids","Builders"],
     morph:"Humanoids with elephantid features: thick grayish skin, flexible prehensile nose, large ears. Height above galactic average (2.2-2.6 m). Exceptional physical strength. Longevity 200-250 years.",
     culture:"Engineers and builders. Key in the expansion of the ISS Nirvana. Without the Roptus, the mega-structure that is Nirvana would not exist at its current scale. They are the silent muscle of the Federation.",
     narrative:"The Roptus built Nirvana and know every module of its structure. When someone wants to know if there is a structural weak point in the Federation's most secret star base, they look for a Roptus.",
     img:mkSVG("#0C0C0C","#A0A0A8","R","hex")},
    {id:"a07",group:"Federation",name:"Biertas",concept:"Leporids · Interstellar Logistics",tags:["L0L0 8-5","Leporids","Courier"],
     morph:"Humanoids with leporid features: long, mobile ears, hind legs longer than forelegs (adapted for microgravity movement), short fur of variable colors. High-speed reflexes.",
     culture:"Agile and fast. Specialized in interstellar logistics and courier services. They are the best small-craft operators in the entire Federation: their superior reflexes and comfort with microgravity make them irreplaceable on high-precision routes.",
     narrative:"Federation logistics depends on the Biertas in ways no one on the Board of Directors will admit publicly. If the Biertas collectively decided to strike, the Federation would function for exactly eleven days.",
     img:mkSVG("#0C0808","#D0C0A0","B","wave")},
    {id:"a08",group:"Federation",name:"Lateo",concept:"Mystical Exudate · Biological Ethics",tags:["Amphibian","Deep Exudate","The Eyes of the Deep"],
     morph:"Amphibian bipeds. Translucent dermis that continuously secretes the Deep Exudate, a substance that induces altered states of consciousness in other species. The secretion is completely involuntary, like breathing.",
     culture:"Ancient, philosophical civilization. The cult 'The Eyes of the Deep' was built by other species around the Lateo, not by them. The ethical debate on responsibility for what your biology does to other minds has never been resolved in the Federation.",
     narrative:"Is a Lateo responsible for the states its presence induces? Federal legal systems treat it as a controlled substance on some planets, which implies that the being itself could be regulated. No existing ethical framework correctly classifies them.",
     img:mkSVG("#0C0E06","#D0C040","L","circle")},
    {id:"a09",group:"Federation",name:"Voistum",concept:"Arachnids · Stellar Navigation",tags:["Centauroid","Arachnids","Cartographers"],
     morph:"Centauroids with an upper humanoid torso and a lower arachnid body of six legs. Eight eyes in panoramic configuration. Their oral appendages produce high-strength silk with applications in stellar engineering.",
     culture:"Navigation specialists. Their wormhole maps are the most accurate. The Voistum predictive model is the reference standard for the entire Federation, with 94.3% reliability on stable-behavior wormholes.",
     narrative:"The 5.7% error margin of the Voistum model includes cases where a wormhole closes without prior signals. The Maint Cluster is that 5.7%.",

    {id:"a10",group:"Federation",name:"Anigodet",concept:"Avians · Remote Explorers",tags:["Ta'Y'Ra","Avians","Messengers"],
     morph:"Avian bipeds with functional wings and a dual respiratory system that allows them to internally pressurize for hostile atmospheres. Plumage adapted to multiple climates. Ultraviolet vision.",
     culture:"Messengers and explorers. Colonies on the most remote planets. The Anigodet are the first to arrive at any new system and the last to leave. Their forward colonies are the only sources of information from zones without quantum coverage.",
     narrative:"There are Anigodet colonies on planets that the Federation lost contact with decades ago. No one knows if they are still alive. And no one has sent anyone to check.",
     img:mkSVG("#080C10","#80B0E0","A","wave")},
    {id:"a11",group:"Federation",name:"Loct",concept:"Branchiators · Fluid Engineers",tags:["Amphibian","Gills","Water Recycling"],
     morph:"Amphibian branchiators. Four limbs with webbed digits. They can survive in space vacuum for up to forty minutes via an involuntary closing membrane on gills and pores. Skin that absorbs ambient moisture.",
     culture:"Fluid engineers. They designed the Mara water recycling systems. The H3 module of federal ships, which recycles 93% of onboard water, is adapted Loct technology.",
     narrative:"The Loct have no territorial interests or political ambitions. What they have is control of the water systems of every Federation ship. In a universe where water is scarce, that is a different kind of power.",
     img:mkSVG("#041010","#40B0B0","L","wave")},
    {id:"a12",group:"Federation",name:"Etio",concept:"Insectoids · Collective Intelligence",tags:["Insectoid","Collective","Distributed Decision"],
     morph:"Insectoid bipeds with chitinous exoskeleton in clade-variable colors. Functional antennae for chemical communication. They have no individuality in the conventional sense: an Etio is only a functional fraction of its clade's collective.",
     culture:"Social colony with distributed intelligence. Decisions are collective. An isolated Etio individual progressively loses cognitive abilities: intelligence resides not in the individual but in the network.",
     narrative:"The philosophical question the Etio poses to the Federation is insoluble: can a being without individuality have individual rights? They have been debating it for sixty years without agreement.",
     img:mkSVG("#0C1006","#80C040","E","hex")},
    {id:"a13",group:"Federation",name:"Rustintee",concept:"Ursids · Mining and Metallurgy",tags:["Quadruped","Ursid","Miners"],
     morph:"Ursid quadrupeds weighing 300-500 kg. High-strength claws adapted for mineral extraction. Dense multi-season fur. Temporary upright posture allows them to manipulate tools with their forelimbs.",
     culture:"Miners and metallurgists. They supply materials for Mara modules. Without the Rustintee, federal ship construction would cost three times as much and take twice as long. They are invisible in federal politics and omnipresent in its economy.",
     narrative:"When the Rustintee of a system decide not to work, it makes news on the Board of Directors. When they work, no one on the Board knows their names.",
     img:mkSVG("#100C08","#A08060","R","scales")},
    {id:"a14",group:"Federation",name:"Jaca'Col",concept:"Cetaceans · The Oral Culture",tags:["Quadruped","Cetacean","Art"],
     morph:"Quadrupeds with morphology derived from cetaceans adapted to dry land. Smooth skin with bioluminescence patterns that form part of their artistic communication. Voice capable of producing frequencies inaudible to most species.",
     culture:"Artists and storytellers. The richest oral culture in the Federation. Their complete history exists only in their sung collective memory: they have never needed writing because no Jaca'Col forgets a story they have heard.",
     narrative:"The Jaca'Col know stories about the universe that are in no federal archive. And they will not share them with anyone who cannot listen at their frequencies.",
     img:mkSVG("#080C14","#6080C0","J","circle")},
    {id:"a15",group:"Federation",name:"Hoeg",concept:"Avians · In Transition",tags:["Avians","Ex-Wilstoid Allies","Transition"],
     morph:"Avian humanoids with feather chromatism varying with age and social status. Wings non-functional for autonomous flight but deployed for social signaling. Pronounced chromatic sexual dimorphism.",
     culture:"Former Wilstoid allies in the process of integrating into the Federation. Alliance with the Empire was not always voluntary: some Hoeg were absorbed and some collaborated. That internal distinction still generates conflicts.",
     narrative:"For many Federation species, a Hoeg is a former collaborator with the Empire, regardless of personal history. For the Hoeg, that generalization is the first thing they try to correct and the last thing they manage to change.",
     img:mkSVG("#100C06","#C0A840","H","wave")},
    {id:"a16",group:"Empire",name:"Aheros",concept:"Pale Elvish · Wilstoid Vassalage",tags:["Wilstoid Prime","Vassals","Lost Warp"],
     morph:"Humanoids with elvish features: above-average height, long limbs, pointed ears, pale skin tones. They were originally the ones who independently developed the Warp Drive. That technology was absorbed by the Wilstoids.",
     culture:"Mystical species. Wilstoid cultural vassalage. They originally developed the Warp, now lost. The Aheros display a level of intelligence and technological capability that contrasts deeply with their position as perpetual vassals.",
     narrative:"The Aheros invented the Warp before anyone else. The Wilstoids took it from them and made them servants. That fact, known but rarely mentioned, is perhaps the greatest documented injustice in the universe.",
     img:mkSVG("#141010","#C8C0D8","A","crystal")},
    {id:"a17",group:"Empire",name:"Wilstoid",concept:"Reptiloids · The Empire",tags:["Reptile","Bone Crest","Supremacists"],
     morph:"Reptiloid bipeds 1.7-2.0 m. Hexagonal beta-keratin micro-scales. Cranial bone crest that grows throughout life: elders develop structures up to forty kilograms. Robust tail. Retractable calcium carbide claws with Mohs hardness 9. Lifespan 150-200 years.",
     culture:"Dominant species of the Empire. Their elders are living libraries venerated above any institution. The Scaly Design is classified as a hate ideology in federal space. Highest punishment: the Broken Quill Condemnation.",
     narrative:"Their worst punishment is not death but the total erasure of all records: complete oblivion. A people who venerate memory as the highest good have a consistent philosophy, even if its consequences are atrocious.",
     img:mkSVG("#100A04","#C88040","W","scales")},
    {id:"a18",group:"Federation",name:"Niecta",concept:"Insectoids · Biopharmaceuticals",tags:["Hexapod","Insectoid","Scientists"],
     morph:"Hexapod insectoids. Two pairs of upper manipulative limbs specialized for precision work. Exoskeleton with caste-dependent hardness variations. Molting cycle every three years including complete renewal of the peripheral nervous system.",
     culture:"Scientists and alchemists. Best galactic biopharmaceuticals. Their laboratories in the Niecta Cluster produce 78% of universally used medicines in the Federation.",
     narrative:"The Niecta have a de facto monopoly on galactic biopharmaceuticals. They neither seek nor defend it: it is a consequence of simply being the best. Which does not make it less problematic for anyone needing an alternative.",
     img:mkSVG("#0A100A","#80C880","N","hex")},
    {id:"a19",group:"Federation",name:"Yoeto",concept:"Cetaceans · Spatial Orientation",tags:["Humanoid","Cetacean","Navigators"],
     morph:"Humanoids with morphology influenced by cetacean ancestors: smooth skin of bluish-gray tone, hydrodynamic limbs, prolonged apnea capacity. Their spatial orientation sense is an independent sensory organ without equivalent in other species.",
     culture:"Navigators with innate natural spatial orientation. They do not need instruments to know their position in a familiar star system: their internal maps are more accurate than first-tier navigation systems.",
     narrative:"A Yoeto can get lost in a city but not in a galaxy. That paradox defines their relationship with spaces: they are the best pilots in the universe and the worst urban pedestrians.",
     img:mkSVG("#060A0C","#60A0C0","Y","wave")},
    {id:"a20",group:"Federation",name:"Arat",concept:"Ursids · Honorable Warriors",tags:["Humanoid","Ursid","Military"],
     morph:"Ursid humanoids: above-average bulk, variable fur colors, non-retractable claws. Their muscle mass makes them the most effective close-combat fighters in federal forces.",
     culture:"Honorable warriors. They serve in federal military forces. Arat culture does not distinguish between serving the federal fleet and serving honor: they are the same thing expressed in different contexts.",
     narrative:"The Arat do not fight for the Federation. They fight for honor, which they express through the Federation. The distinction is subtle but matters: an Arat who perceives the Federation acting without honor can stop serving it.",
     img:mkSVG("#0C0A08","#A08048","A","scales")},
    {id:"a21",group:"Federation",name:"Aeon",concept:"Octopods · Dieselpunk Philosophers",tags:["Humanoid","Octopod","Philosophy"],
     morph:"Humanoids with eight highly mobile prehensile upper limbs. Skin with adaptive chromatism. Distributed brain: two main ganglia and six secondary ones in the limbs. They can process eight independent manual tasks simultaneously.",
     culture:"Philosophers and academics. Ozymandias Station is their magnum opus. Dieselpunk aesthetic. Their philosophy of 'the present is the only time that matters' contrasts with other species' obsession with history and legacy.",
     narrative:"Ozymandias Station is considered the most important architectural work in the known universe. It was designed by an Aeon who died before seeing its completion. The name is a philosopher's joke about permanence.",
     img:mkSVG("#0A080E","#B0A0C8","A","circle")},
    {id:"a22",group:"Federation",name:"Lunciti",concept:"Unguligrades · Herders",tags:["Quadruped","Unguligrade","Terraformers"],
     morph:"Unguligrade quadrupeds sharing a planet with the Aeon. Hooves adapted to multiple surfaces, including orbital platforms. Their digestive system can process biomass in microgravity conditions.",
     culture:"They share a planet with the Aeon. Herders and terraformers. Their relationship with the Aeon is one of practical complementarity: the Aeon plan and philosophize, the Lunciti execute and nourish. It is a balance that has worked for centuries.",
     narrative:"The Lunciti have terraformed forty-two planets in the last two centuries. They are the Federation's agricultural engine and the least cited in Board speeches.",
     img:mkSVG("#080C06","#80A060","L","wave")},
    {id:"a23",group:"Federation",name:"Gipt",concept:"Insectoids · Field Biologists",tags:["Humanoid","Insectoid","Atompunk"],
     morph:"Insectoid humanoids with light exoskeleton and coloration patterns varying with environment. Four arms: two for precision manipulation and two for load. Chemical receptors on palps for in-situ biological analysis.",
     culture:"Field biologists. Scientific expeditions to unexplored corners. Atompunk aesthetic. Their field teams have cataloged over fifteen thousand new species in the last century.",
     narrative:"The Gipt have reached planets with corrupted Ethernergy (analogous to Rudon's universe) where no other scientist survived more than a week. Their methods are as effective as they are incomprehensible to other species.",
     img:mkSVG("#0A0E08","#A0C860","G","crystal")},
    {id:"a24",group:"Federation",name:"Digoto",concept:"Avians · Rayado Explorers",tags:["Quadruped","Avian","Saito Empire"],
     morph:"Avian quadrupeds with membrane wings between fore and hind limbs allowing efficient gliding. Frontal binocular vision unusual for their base morphology. High-precision three-dimensional cognitive map.",
     culture:"Explorers. First to map the Rayado galaxy. Lordships under the Saito Empire. The Digoto were the cartographers of Saito expansion: their maps opened routes that the Empire still uses.",
     narrative:"The Saito Empire inherited the Digoto's cartographic work but did not publicly acknowledge their authorship for decades. That silence has consequences still being negotiated.",
     img:mkSVG("#0A0C08","#90C070","D","wave")},
    {id:"a25",group:"Federation",name:"Uteo",concept:"Crystalline Mineral · Collective Sacrifice",tags:["Silica-based","Sleepers","The Jewel"],
     morph:"The only known silica-based civilization. Crystalline mineral structure. Their entire planet Xyren is a single organism: what looks like surface are people sleeping in collective sacrifice.",

// WORLD STRUCTURE
const WD = [
  {id:"rudon",name:"The World of Rudon",genre:"Epic Fantasy · Dragons",year:"The World of Magic",color:cRudon,colorLt:cRudonLt,img:mkProj("#120A05",cRudonLt,"R"),species:rudonSpecies},
  {id:"azul",name:"Planet Blue Universe",genre:"Hard Science Fiction",year:"Far Future",color:cAzul,colorLt:cAzulLt,img:mkProj("#050A10",cAzulLt,"P"),species:azulSpecies},
  {id:"vonder",name:"Vonderburg Manual",genre:"Gothic Horror · Vampires",year:"Velum Salomonis Universe",color:cVonder,colorLt:cVonderLt,img:mkProj("#0D0307",cVonderLt,"V"),species:vonderSpecies}
];

let CW = WD[0];
let filtered = CW.species;
let openSp = null;

function render(){
  const wr = document.getElementById("world-row");
  wr.innerHTML = WD.map(w => `<div class="wcard${CW.id===w.id?' active':''}" style="${CW.id===w.id?`border-color:${w.color};`:''}" data-id="${w.id}">
    <img class="wcard-img" src="${w.img}" alt="${w.name}"/>
    <div class="wcard-bar" style="background:${w.color};"></div>
    <div class="wcard-info">
      <div class="wcard-genre" style="color:${w.colorLt};">${w.genre}</div>
      <div class="wcard-name">${w.name}</div>
      <div class="wcard-count">${w.species.length} species · ${w.year}</div>
    </div>
  </div>`).join("");
  document.getElementById("sx-meta").textContent = `${CW.species.length} catalogued species · ${CW.year}`;
  renderGrid();
  document.querySelectorAll(".wcard").forEach(el => el.addEventListener("click",()=>{
    const nw = WD.find(w=>w.id===el.dataset.id);
    if(nw && nw.id!==CW.id){ CW = nw; document.getElementById("sx-filter").value=""; filtered = CW.species; render(); }
  }));
}

function renderGrid(){
  const q = document.getElementById("sx-filter").value.toLowerCase().trim();
  filtered = q ? CW.species.filter(s => s.name.toLowerCase().includes(q) || s.concept.toLowerCase().includes(q) || s.tags.some(t=>t.toLowerCase().includes(q))) : CW.species;
  document.getElementById("sx-count").textContent = filtered.length+" / "+CW.species.length;
  const g = document.getElementById("sp-grid");
  if(!filtered.length){ g.innerHTML=`<div class="empty">No results for "${q}"</div>`; return; }
  g.innerHTML = filtered.map(sp => `<div class="spcard" data-id="${sp.id}">
    <img class="spcard-img" src="${sp.img}" alt="${sp.name}"/>
    <div class="spcard-overlay"></div>
    <div class="spcard-info">
      <div class="spcard-concept" style="color:${CW.colorLt};">${sp.concept.split("·")[0].trim()}</div>
      <div class="spcard-name">${sp.name}</div>
      <div class="tags-mini">${sp.tags.slice(0,2).map(t=>`<span class="tag-mini" style="color:${CW.colorLt};border-color:${CW.color};">${t}</span>`).join("")}</div>
    </div>
  </div>`).join("");
  document.querySelectorAll(".spcard").forEach(el => el.addEventListener("click",()=>{
    const sp = filtered.find(s=>s.id===el.dataset.id);
    if(sp) openModal(sp);
  }));
}

function openModal(sp){
  openSp = sp;
  document.getElementById("m-img").src = sp.img;
  document.getElementById("m-img").alt = sp.name;
  document.getElementById("m-bar").style.background = CW.color;
  document.getElementById("m-project").style.color = CW.colorLt;
  document.getElementById("m-project").textContent = CW.genre+" · "+CW.name;
  document.getElementById("m-name").textContent = sp.name;
  document.getElementById("m-concept").textContent = sp.concept;
  document.getElementById("m-tags").innerHTML = sp.tags.map(t=>`<span class="modal-tag" style="border-color:${CW.color};color:${CW.colorLt};">${t}</span>`).join("");
  document.getElementById("m-s1").textContent = sp.morph;
  document.getElementById("m-s2").textContent = sp.culture;
  document.getElementById("m-s3").textContent = sp.narrative;
  document.getElementById("m-l1").style.color = CW.colorLt;
  document.getElementById("m-l2").style.color = CW.colorLt;
  document.getElementById("m-l3").style.color = CW.colorLt;
  document.getElementById("modal-wrap").classList.add("open");
}
function closeModal(){ document.getElementById("modal-wrap").classList.remove("open"); openSp=null; }
document.getElementById("modal-bg").addEventListener("click",closeModal);
document.getElementById("modal-close").addEventListener("click",closeModal);
document.addEventListener("keydown",e=>{if(e.key==="Escape") closeModal();});
document.getElementById("sx-filter").addEventListener("input",renderGrid);
render();
</script>
