<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" type="image/x-icon" href="favicon.png">
<title>Species Explorer · César Tinoco · Expanded Universe</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
  :root {
    --ink:       #0d0d0f;
    --paper:     #f5f2ec;
    --muted:     #888070;
    --rule:      rgba(245, 242, 236, 0.2);
    --rudon:     #8b4a1c;
    --rudon-lt:  #f0d5b8;
    --azul:      #1a3a5c;
    --azul-lt:   #c0d8f0;
    --vonder:    #3a1020;
    --vonder-lt: #e8c0c8;
    --accent:    #c8a860;
    --bg-sec:    #161619;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Cormorant Garamond', Georgia, serif;
    background: var(--ink);
    color: var(--paper);
    font-size: 18px;
    line-height: 1.65;
  }

  #sx { padding: 4rem 5rem; max-width: 1400px; margin: 0 auto; }
  
  .sx-hdr {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
    padding-bottom: 1rem;
    border-bottom: 2px solid var(--accent);
    margin-bottom: 2.5rem;
  }
  .sx-hdr h2 { 
    font-size: clamp(2rem, 4vw, 3.2rem); 
    font-weight: 300; 
    line-height: 1.2; 
    letter-spacing: -.01em;
    margin: 0;
  }
  .sx-hdr span { 
    font-family: 'DM Mono', monospace; 
    font-size: .75rem; 
    letter-spacing: .18em; 
    text-transform: uppercase; 
    color: var(--accent);
    align-self: flex-end;
  }
  .portfolio-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--rule);
    padding: 0.5rem 1.2rem;
    border-radius: 0;
    color: var(--paper);
    text-decoration: none;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    display: inline-block;
    align-self: center;
  }
  .portfolio-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(200, 168, 96, 0.08);
  }

  .world-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-bottom: 2.5rem; }
  .wcard { 
    cursor: pointer; background: var(--bg-sec); border: 1px solid var(--rule); 
    overflow: hidden; transition: border-color .2s, transform .2s; position: relative; 
  }
  .wcard:hover { transform: translateY(-4px); border-color: var(--muted); }
  .wcard.active { border-width: 2px; }
  .wcard-img { width: 100%; aspect-ratio: 16/7; object-fit: cover; display: block; opacity: 0.8; transition: opacity .2s; }
  .wcard:hover .wcard-img { opacity: 1; }
  .wcard-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
  .wcard-info { padding: 1.2rem 1.5rem; }
  .wcard-genre { font-family: 'DM Mono', monospace; font-size: .65rem; letter-spacing: .18em; text-transform: uppercase; margin-bottom: .4rem; }
  .wcard-name { font-size: 1.4rem; font-weight: 300; line-height: 1.2; }
  .wcard-count { font-family: 'DM Mono', monospace; font-size: .65rem; margin-top: .5rem; color: rgba(245,242,236,.6); letter-spacing: .1em; text-transform: uppercase; }

  .sx-toolbar { 
    display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; 
    background: var(--bg-sec); padding: .8rem 1.2rem; border: 1px solid var(--rule); 
  }
  .sx-filter { 
    flex: 1; background: transparent; border: none; color: var(--paper); 
    font-family: 'DM Mono', monospace; font-size: .8rem; outline: none; letter-spacing: .05em; 
  }
  .sx-filter::placeholder { color: rgba(245,242,236,.3); }
  .sx-label { font-family: 'DM Mono', monospace; font-size: .7rem; letter-spacing: .12em; text-transform: uppercase; color: var(--accent); margin-left: auto; }

  .sp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1.5rem; }
  .spcard { 
    cursor: pointer; aspect-ratio: 2/3; position: relative; overflow: hidden; 
    border: 1px solid var(--rule); transition: transform .25s, border-color .2s; background: var(--bg-sec);
  }
  .spcard:hover { transform: translateY(-4px) scale(1.02); }
  .spcard-img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .3s; opacity: 0.85; }
  .spcard:hover .spcard-img { transform: scale(1.05); opacity: 1; }
  .spcard-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(13,13,15,.95) 0%, rgba(13,13,15,.6) 40%, transparent 70%); }
  .spcard-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 1rem; }
  .spcard-concept { font-family: 'DM Mono', monospace; font-size: .55rem; letter-spacing: .12em; text-transform: uppercase; margin-bottom: .3rem; opacity: .9; }
  .spcard-name { font-size: 1.1rem; font-weight: 400; line-height: 1.2; margin-bottom: .5rem; }
  .tags-mini { display: flex; gap: .3rem; flex-wrap: wrap; }
  .tag-mini { font-family: 'DM Mono', monospace; font-size: .5rem; letter-spacing: .08em; padding: .15rem .4rem; border: 1px solid; opacity: .8; text-transform: uppercase; }

  .modal-wrap { display: none; position: fixed; inset: 0; z-index: 1000; align-items: center; justify-content: center; padding: 2rem; }
  .modal-wrap.open { display: flex; animation: fadeIn .2s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal-bg { position: absolute; inset: 0; background: rgba(0,0,0,.9); cursor: zoom-out; }
  .modal-box { 
    position: relative; z-index: 1; display: flex; width: 100%; max-width: 900px; max-height: 85vh; 
    background: var(--ink); border: 1px solid var(--rule); overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
  }
  .modal-img-wrap { width: 35%; flex-shrink: 0; position: relative; background: var(--bg-sec); }
  .modal-img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0.9; filter: grayscale(15%); }
  .modal-body { flex: 1; overflow-y: auto; padding: 3rem 4rem; }
  .modal-project { font-family: 'DM Mono', monospace; font-size: .68rem; letter-spacing: .18em; text-transform: uppercase; margin-bottom: .8rem; }
  .modal-name { font-size: clamp(2rem, 3vw, 2.8rem); font-weight: 300; line-height: 1.1; margin-bottom: .8rem; letter-spacing: -.01em; }
  .modal-concept { font-size: 1.12rem; font-style: italic; color: rgba(245,242,236,.65); margin-bottom: 1.5rem; line-height: 1.6; }
  .modal-tags { display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: 2.5rem; }
  .modal-tag { font-family: 'DM Mono', monospace; font-size: .65rem; letter-spacing: .1em; text-transform: uppercase; padding: .3rem .8rem; border: 1px solid; }
  .modal-divider { border-top: 1px solid var(--rule); margin: 2rem 0; height: 0; }
  .modal-section { margin-bottom: 1.8rem; }
  .modal-sec-label { font-family: 'DM Mono', monospace; font-size: .7rem; letter-spacing: .14em; text-transform: uppercase; margin-bottom: .8rem; padding-bottom: .4rem; border-bottom: 1px solid var(--rule); color: var(--muted); }
  .modal-sec-body { font-size: 1rem; line-height: 1.65; color: rgba(245,242,236,.85); }
  .modal-close { position: absolute; top: 1.2rem; right: 1.5rem; background: none; border: none; font-size: 2.5rem; cursor: pointer; color: var(--paper); line-height: 1; z-index: 2; font-family: 'DM Mono', monospace; opacity: .6; transition: opacity .2s; }
  .modal-close:hover { opacity: 1; }
  .empty { padding: 4rem 2rem; text-align: center; font-family: 'DM Mono', monospace; font-size: .8rem; letter-spacing: .1em; color: var(--muted); text-transform: uppercase; }

  @media (max-width: 900px) {
    #sx { padding: 2rem 1.5rem; }
    .world-row { grid-template-columns: 1fr; }
    .modal-box { flex-direction: column; overflow-y: auto; }
    .modal-img-wrap { width: 100%; height: 200px; }
    .modal-body { padding: 2rem 1.5rem; overflow-y: visible; }
    .modal-close { top: .5rem; right: .8rem; }
    .sx-hdr {
      flex-direction: column;
      align-items: stretch;
    }
    .portfolio-btn {
      align-self: flex-start;
    }
  }
</style>
</head>

  <div class="sx-hdr">

    <a href="index.html" class="portfolio-btn">Portfolio</a>

<script>
// ======================== SVG UTILITIES ==========================
function mkSVG(bg,ac,lt,pat="hex"){
  const P={
    scales:`<path d="M55,55 Q105,30 155,55 Q205,30 255,55" fill="none" stroke="${ac}" stroke-width="1.5" opacity=".3"/><path d="M35,92 Q85,67 135,92 Q185,67 235,92 Q280,67 300,92" fill="none" stroke="${ac}" stroke-width="1.4" opacity=".2"/><path d="M55,128 Q105,103 155,128 Q205,103 255,128" fill="none" stroke="${ac}" stroke-width="1.2" opacity=".15"/>`,
    hex:`<polygon points="150,22 218,60 218,138 150,176 82,138 82,60" fill="none" stroke="${ac}" stroke-width="1.2" opacity=".3"/><polygon points="150,52 198,78 198,132 150,158 102,132 102,78" fill="none" stroke="${ac}" stroke-width=".8" opacity=".15"/>`,
    circle:`<circle cx="150" cy="105" r="72" fill="none" stroke="${ac}" stroke-width="1.2" opacity=".3"/><circle cx="150" cy="105" r="46" fill="none" stroke="${ac}" stroke-width=".8" opacity=".2"/><circle cx="150" cy="105" r="20" fill="${ac}" opacity=".15"/>`,
    crystal:`<polygon points="150,14 196,78 185,168 115,168 104,78" fill="none" stroke="${ac}" stroke-width="1.2" opacity=".3"/><line x1="127" y1="14" x2="150" y2="168" stroke="${ac}" stroke-width=".6" opacity=".15"/><line x1="173" y1="14" x2="150" y2="168" stroke="${ac}" stroke-width=".6" opacity=".15"/>`,
    wave:`<path d="M36,86 Q78,50 118,86 Q160,122 202,86 Q244,50 276,86" fill="none" stroke="${ac}" stroke-width="1.5" opacity=".3"/><path d="M36,118 Q78,82 118,118 Q160,154 202,118 Q244,82 276,118" fill="none" stroke="${ac}" stroke-width="1" opacity=".2"/>`,
    gothic:`<path d="M150,18 L170,58 L202,58 L178,80 L188,114 L150,93 L112,114 L122,80 L98,58 L130,58 Z" fill="none" stroke="${ac}" stroke-width="1.2" opacity=".3"/><rect x="134" y="58" width="32" height="52" fill="none" stroke="${ac}" stroke-width=".8" opacity=".15" rx="16"/>`
  };
  const s=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 380"><rect width="300" height="380" fill="${bg}"/><rect width="300" height="380" fill="${ac}" opacity=".08"/>${P[pat]||P.hex}<text x="150" y="245" font-family="Georgia,serif" font-size="70" font-weight="bold" text-anchor="middle" fill="${ac}" opacity=".2">${lt}</text><rect x="0" y="0" width="5" height="380" fill="${ac}" opacity=".85"/></svg>`;
  return "data:image/svg+xml,"+encodeURIComponent(s);
}
function mkProj(bg,ac,lbl){
  const s=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220"><rect width="600" height="220" fill="${bg}"/><text x="300" y="130" font-family="Georgia,serif" font-size="100" font-weight="bold" text-anchor="middle" fill="${ac}" opacity=".15">${lbl}</text><rect x="0" y="0" width="7" height="220" fill="${ac}" opacity=".9"/><text x="28" y="192" font-family="monospace" font-size="8" fill="${ac}" opacity=".4" letter-spacing="3">PROJECT IMAGE</text></svg>`;
  return "data:image/svg+xml,"+encodeURIComponent(s);
}
const cRudon = "#8b4a1c", cRudonLt = "#f0d5b8";
const cAzul = "#1a3a5c", cAzulLt = "#c0d8f0";
const cVonder = "#3a1020", cVonderLt = "#e8c0c8";

// ========== COMPLETE DATA FROM THE THREE DOCUMENTS ==========
// RUDON UNIVERSE (dragons, humans, intelligent creatures)
const rudonSpecies = [
  {id:"rud_humens",name:"Humens",concept:"Warriors · Versatile mages",tags:["Human","Majority","Magic"],morph:"Hairless, beardless humanoids. The most widespread human species, great users of magic and combat.",culture:"Main inhabitants of human kingdoms (Arron, Alexandria, Susen). They dominate politics and war in Miskalia.",narrative:"Created by Yun, they were divided into four species after the death of Titan Agripa. The Humens are the military backbone of humanity.",img:mkSVG("#120905",cRudonLt,"HM","hex")},
  {id:"rud_vayuns",name:"Vayuns",concept:"Scientists · Isolationists",tags:["Reptilian","Brumation","Great Vayun Nation"],morph:"Humanoids with reptilian features. Soft scales, vertical eyes. They enter torpor during extreme cold months (Criodais, Criomensi).",culture:"Isolated in the Great Vayun Nation. Natural scientists, they study magic with rigorous methodology. They only trade with Alexandria.",narrative:"Guardians of ancestral knowledge. Their winter brumation is a biological mystery that makes them vulnerable yet respected.",img:mkSVG("#102010",cRudonLt,"VY","scales")},
  {id:"rud_nykuns",name:"Nykuns",concept:"Nomads · Stealthy gatherers",tags:["Furry","Tail","Mihusus"],morph:"Furry humanoids with long ears and a prehensile tail. Eyes adapted to twilight.",culture:"Nomads living off gathering and trade. Adapted to go unnoticed by the Mihusus. They build no permanent cities.",narrative:"The elusive ones. Their ability to move undetected makes them the best explorers and smugglers of Rudon.",img:mkSVG("#1a1a10",cRudonLt,"NK","wave")},
  {id:"rud_wongs",name:"Wongs",concept:"Farmers · Brute force",tags:["Horns","Rare","Physical combat"],morph:"Humanoids with velvety horns, robust build. Higher bone density than other humans.",culture:"Rare, dedicated to agriculture in fertile regions. In combat they are brutal and resilient.",narrative:"The peasant warriors. Though mostly peaceful, when enraged they can tear armor with bare hands.",img:mkSVG("#1a1005",cRudonLt,"WN","circle")},
  {id:"rud_dorados",name:"Golden Dragons",concept:"Natural leaders · Wise",tags:["Metallic","Kings","Nest"],morph:"Shining golden scales. 2-2.5m adults. Six-limbed membranous wings. Majestic flight.",culture:"Leaders of metallic nests. Coveted as kings by other scales. Great wisdom and diplomatic skill.",narrative:"The backbone of the draconic alliance. Their queen is the highest authority in metallic clans.",img:mkSVG("#1a1205",cRudonLt,"DR","scales")},
  {id:"rud_plateados",name:"Silver Dragons",concept:"Mages · Historians",tags:["Metallic","Ether","Libraries"],morph:"Silver scales shining in moonlight. Skilled in Ethernergia manipulation.",culture:"Guardians of history. Preserve knowledge in hexagonal libraries. Their magical chant is legendary.",narrative:"The archivists of Rudon. Without them, the memory of the Dragon Wars would have been lost.",img:mkSVG("#11151a",cRudonLt,"PL","hex")},
  {id:"rud_broncineos",name:"Bronze Dragons",concept:"Strategists · Tacticians",tags:["Metallic","War","Formations"],morph:"Bronze-colored scales, robust. Broad wings for close maneuvers.",culture:"Experts in battle and tactics. Lead flight formations in combat.",narrative:"The battle masters. Their presence in the sky organizes the chaos of war.",img:mkSVG("#1a1008",cRudonLt,"BR","gothic")},
  {id:"rud_ocres",name:"Ocher Dragons",concept:"Builders · Agricultural",tags:["Metallic","Architecture","Terraces"],morph:"Earth-toned ocher scales. Broad claws for digging and building.",culture:"Build the hexagonal towers of the nests. Experts in agriculture and aqueducts.",narrative:"The forgotten engineers. Without them, dragon nests would lack their impressive cities.",img:mkSVG("#1a140a",cRudonLt,"OC","wave")},
  {id:"rud_cobrizos",name:"Copper Dragons",concept:"Diplomats · Traders",tags:["Metallic","Barter","Merchants"],morph:"Copper scales with orange reflections. Agile flight, ideal for long distances.",culture:"Natural diplomats and excellent traders. Maintain routes between nests and human kingdoms.",narrative:"The winged ambassadors. Their barter network sustains Rudon's economy.",img:mkSVG("#1a0e05",cRudonLt,"CO","circle")},
  {id:"rud_rojos",name:"Red Dragons",concept:"Fierce warriors",tags:["Matte","Physical strength","Attack"],morph:"Blood-red scales, muscular. The physically strongest among dragons.",culture:"Warlike and proud. They often start conflicts with humans.",narrative:"The wrath of the matte scales. In the dragon war they were the vanguard against the metallic scales.",img:mkSVG("#1a0805",cRudonLt,"RJ","scales")},
  {id:"rud_negros",name:"Black Dragons",concept:"Brutal mages",tags:["Matte","Destructive magic","Betrayal"],morph:"Matte black scales, red eyes. The best mages among dragons, specialized in vile magic.",culture:"Betrayed the pact of Luna. Now hunted by humans and metallics.",narrative:"The fallen ones. Their unbridled ambition cost them the favor of the gods.",img:mkSVG("#0d0d0f",cRudonLt,"NG","hex")},
  {id:"rud_azules",name:"Blue Dragons",concept:"Maritime sages",tags:["Matte","Ocean","Calm"],morph:"Deep blue scales. Live near the sea, hydrophobic scales.",culture:"Calm sages. Mediate between clans and study magical tides.",narrative:"The philosophers of the coast. Their wisdom is respected even by metallics.",img:mkSVG("#0a1420",cRudonLt,"AZ","wave")},
  {id:"rud_verdes",name:"Green Dragons",concept:"Magical farmers",tags:["Matte","Nutrients","Pagoh"],morph:"Emerald green scales. Specialized in cultivating magical plants.",culture:"Main producers of nutrients for mages. Trade with all factions.",narrative:"The sustainers. Without their harvests, magic would be much weaker in Rudon.",img:mkSVG("#0a1a0a",cRudonLt,"VD","circle")},
  {id:"rud_blancos",name:"White Dragons",concept:"Scientists · Mathematicians",tags:["Matte","Cryomancy","Logic"],morph:"Snow-white scales. Adapted to extreme cold. Frost breath.",culture:"The best scientists and mathematicians. Design calendars and predict Sira and Muna cycles.",narrative:"The brains of Rudon. Their obsession with numbers created the month and hour system.",img:mkSVG("#151515",cRudonLt,"BC","crystal")},
  {id:"rud_gemas",name:"Gem-Scale Dragons",concept:"Subterranean · Living jewels",tags:["Diamond","Emerald","Sapphire"],morph:"Crystalline scales like gems. Live under mountains. Glow with their own light.",culture:"Few nests, isolated. Their architecture is inverted: towers that grow downward.",narrative:"The wandering treasures. Their skin is valuable, so they hide jealously.",img:mkSVG("#101018",cRudonLt,"GM","crystal")},
  {id:"rud_platinos",name:"Platinum Dragons",concept:"Rare · High mountains",tags:["Mutation","Sages","Ancestral"],morph:"Iridescent platinum scales. Live on the highest peaks. Very long-lived.",culture:"Few individuals. Respected as advisors to dragon kings.",narrative:"The hermits of the clouds. They speak with the gods.",img:mkSVG("#141a1f",cRudonLt,"PT","gothic")},
  {id:"rud_marinos",name:"Sea Dragons",concept:"Oceanic · 4 limbs",tags:["Sea","Pearlescent","Depths"],morph:"Four limbs instead of six. Hydrodynamic pearlescent scales. Aquatic breathing.",culture:"Live under the sea. Build horizontal nests. Allies of Tiamat.",narrative:"The guardians of the depths. Sink ships that pollute their seas.",img:mkSVG("#0a1015",cRudonLt,"MR","wave")},
  {id:"rud_celestiales",name:"Celestial Dragons",concept:"Royal mutation · Infertile",tags:["Rulers","5 meters","Sages"],morph:"Extremely long (up to 5m). Starlight wings. Cannot reproduce.",culture:"Born from the ruling class. They are strategists, mages and sages, but their line ends with them.",narrative:"The sacrificed for power. Their knowledge is immense, their legacy null.",img:mkSVG("#0a0a1a",cRudonLt,"CEL","circle")},
  {id:"rud_alejandrita",name:"Alexandrite Dragons",concept:"Last nest · Hidden",tags:["Gem","Alexandria","Secret"],morph:"Scales that change color (green to red). Very few individuals.",culture:"A single nest survives hidden beneath Alexandria castle. Protected by the royal family.",narrative:"The hidden treasure. Their existence is a secret that could change human politics.",img:mkSVG("#1a0812",cRudonLt,"AX","scales")},
  {id:"rud_tiamat",name:"Tiamat",concept:"Unique creature · Five heads",tags:["Dragon goddess","Oceanic","Depths"],morph:"Five independent heads with their own vocal apparatus. Immeasurable length.",culture:"Created by Yun. Lives in the depths. Sinks ships regularly.",narrative:"Someone gave her information about Comestio's supply ship. That question — who — opens one of the most dangerous arcs.",img:mkSVG("#0a0a12",cRudonLt,"TIA","scales")},
  {id:"rud_aranas",name:"Ñaro Canyon Spiders",concept:"Predator · Ethereal neutralizer",tags:["Negotiable","Anti-magic","Webs"],morph:"Large arachnids. Webs that neutralize Ethernergia. 400kg loads on vertical walls.",culture:"Not domesticated — negotiated with. Safe routes in exchange for crops.",narrative:"They have begun to reject routes without apparent problem. Vokalung suspects they respond to changes in ethereal flow.",img:mkSVG("#1a0a04",cRudonLt,"AR","wave")},
  {id:"rud_unicornios",name:"Unicorns",concept:"Corruption detector",tags:["Pure mount","Incorruptible","Ethereal plane"],morph:"Equine appearance with a one-meter horn. In the presence of ethereal corruption, they vanish to the ethereal plane.",culture:"Only ridden by pure Kinergia. Infallible corruption detectors.",narrative:"A unicorn that refuses to be ridden is top-tier strategic information.",img:mkSVG("#151020",cRudonLt,"UN","circle")},
  {id:"rud_varberians",name:"Varberians",concept:"Cursed humans · Animal transformation",tags:["Ethereal curse","Northern Drakonia","Wolves"],morph:"Humanoids with involuntary animal transformations. In exposed generations, transformation can be permanent.",culture:"Born into the curse. Live in northern Drakonia. A living example of the danger of uncontrolled Ethernergia.",narrative:"The most powerful argument for Rudon's Pillar II: without understanding, Ethernergia destroys.",img:mkSVG("#14100a",cRudonLt,"VB","hex")}
];

// PLANETA AZUL UNIVERSE (all intelligent species from the catalogue)

// WORLD STRUCTURE
const WD = [
  {id:"rudon",name:"The World of Rudon",genre:"Epic Fantasy · Dragons",year:"The World of Magic",color:cRudon,colorLt:cRudonLt,img:mkProj("#120A05",cRudonLt,"R"),species:rudonSpecies},
  {id:"azul",name:"Planet Blue Universe",genre:"Hard Science Fiction",year:"Far Future",color:cAzul,colorLt:cAzulLt,img:mkProj("#050A10",cAzulLt,"P"),species:azulSpecies},
  {id:"vonder",name:"Vonderburg Manual",genre:"Gothic Horror · Vampires",year:"Velum Salomonis Universe",color:cVonder,colorLt:cVonderLt,img:mkProj("#0D0307",cVonderLt,"V"),species:vonderSpecies}
];

let CW = WD[0];
let filtered = CW.species;
let openSp = null;

function render(){
  const wr = document.getElementById("world-row");
  wr.innerHTML = WD.map(w => `<div class="wcard${CW.id===w.id?' active':''}" style="${CW.id===w.id?`border-color:${w.color};`:''}" data-id="${w.id}">
    <img class="wcard-img" src="${w.img}" alt="${w.name}"/>
    <div class="wcard-bar" style="background:${w.color};"></div>
    <div class="wcard-info">
      <div class="wcard-genre" style="color:${w.colorLt};">${w.genre}</div>
      <div class="wcard-name">${w.name}</div>
      <div class="wcard-count">${w.species.length} species · ${w.year}</div>
    </div>
  </div>`).join("");
  document.getElementById("sx-meta").textContent = `${CW.species.length} catalogued species · ${CW.year}`;
  renderGrid();
  document.querySelectorAll(".wcard").forEach(el => el.addEventListener("click",()=>{
    const nw = WD.find(w=>w.id===el.dataset.id);
    if(nw && nw.id!==CW.id){ CW = nw; document.getElementById("sx-filter").value=""; filtered = CW.species; render(); }
  }));
}

function renderGrid(){
  const q = document.getElementById("sx-filter").value.toLowerCase().trim();
  filtered = q ? CW.species.filter(s => s.name.toLowerCase().includes(q) || s.concept.toLowerCase().includes(q) || s.tags.some(t=>t.toLowerCase().includes(q))) : CW.species;
  document.getElementById("sx-count").textContent = filtered.length+" / "+CW.species.length;
  const g = document.getElementById("sp-grid");
  if(!filtered.length){ g.innerHTML=`<div class="empty">No results for "${q}"</div>`; return; }
  g.innerHTML = filtered.map(sp => `<div class="spcard" data-id="${sp.id}">
    <img class="spcard-img" src="${sp.img}" alt="${sp.name}"/>
    <div class="spcard-overlay"></div>
    <div class="spcard-info">
      <div class="spcard-concept" style="color:${CW.colorLt};">${sp.concept.split("·")[0].trim()}</div>
      <div class="spcard-name">${sp.name}</div>
      <div class="tags-mini">${sp.tags.slice(0,2).map(t=>`<span class="tag-mini" style="color:${CW.colorLt};border-color:${CW.color};">${t}</span>`).join("")}</div>
    </div>
  </div>`).join("");
  document.querySelectorAll(".spcard").forEach(el => el.addEventListener("click",()=>{
    const sp = filtered.find(s=>s.id===el.dataset.id);
    if(sp) openModal(sp);
  }));
}

function openModal(sp){
  openSp = sp;
  document.getElementById("m-img").src = sp.img;
  document.getElementById("m-img").alt = sp.name;
  document.getElementById("m-bar").style.background = CW.color;
  document.getElementById("m-project").style.color = CW.colorLt;
  document.getElementById("m-project").textContent = CW.genre+" · "+CW.name;
  document.getElementById("m-name").textContent = sp.name;
  document.getElementById("m-concept").textContent = sp.concept;
  document.getElementById("m-tags").innerHTML = sp.tags.map(t=>`<span class="modal-tag" style="border-color:${CW.color};color:${CW.colorLt};">${t}</span>`).join("");
  document.getElementById("m-s1").textContent = sp.morph;
  document.getElementById("m-s2").textContent = sp.culture;
  document.getElementById("m-s3").textContent = sp.narrative;
  document.getElementById("m-l1").style.color = CW.colorLt;
  document.getElementById("m-l2").style.color = CW.colorLt;
  document.getElementById("m-l3").style.color = CW.colorLt;
  document.getElementById("modal-wrap").classList.add("open");
}
function closeModal(){ document.getElementById("modal-wrap").classList.remove("open"); openSp=null; }
document.getElementById("modal-bg").addEventListener("click",closeModal);
document.getElementById("modal-close").addEventListener("click",closeModal);
document.addEventListener("keydown",e=>{if(e.key==="Escape") closeModal();});
document.getElementById("sx-filter").addEventListener("input",renderGrid);
render();
</script>
